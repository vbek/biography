<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nepal Election 2082 – Live Results</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

/* ── theme tokens ── */
:root{
  --bg:#07101f;--surf:#0d1627;--card:#121e32;--border:#1a2d47;
  --text:#e8edf5;--muted:#5a7494;--sub:#8ba3c0;
  --gold:#e8c84a;--blue:#4f8ef7;--green:#2dd67a;--red:#f05252;
  --shadow:rgba(0,0,0,.55);
  --header:linear-gradient(160deg,#061025 0%,#0f2040 55%,#061025 100%);
}
html.light{
  --bg:#eef2f8;--surf:#fff;--card:#fff;--border:#dae1ed;
  --text:#152032;--muted:#6a8aaa;--sub:#3a5a78;
  --gold:#b45309;--blue:#2563eb;--green:#16a34a;--red:#dc2626;
  --shadow:rgba(0,0,0,.08);
  --header:linear-gradient(160deg,#1a3a6b 0%,#1d52c8 55%,#1a3a6b 100%);
}

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;
     min-height:100vh;transition:background .3s,color .3s}

/* ── header ── */
header{
  background:var(--header);border-bottom:1px solid var(--border);
  padding:13px 24px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;gap:12px;
}
.hd-left{display:flex;align-items:center;gap:13px;min-width:0}
.flag{width:4px;height:42px;border-radius:2px;flex-shrink:0;
       background:linear-gradient(to bottom,#e8c84a 0 33%,#4f8ef7 33% 66%,#f05252 66% 100%)}
.hd-title h1{font-size:16px;font-weight:700;color:#fff;white-space:nowrap;
              overflow:hidden;text-overflow:ellipsis}
.hd-title h1 em{color:#e8c84a;font-style:normal}
.hd-title p{font-size:10.5px;color:rgba(255,255,255,.5);margin-top:2px;white-space:nowrap}
.hd-right{display:flex;align-items:center;gap:9px;flex-shrink:0}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(45,214,122,.1);
            border:1px solid rgba(45,214,122,.3);border-radius:20px;padding:4px 12px;
            font-size:9.5px;font-weight:700;color:#2dd67a;letter-spacing:.9px}
.dot{width:6px;height:6px;border-radius:50%;background:#2dd67a;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(1.6)}}
.tog-row{display:flex;align-items:center;gap:6px}
.tog-label{font-size:10px;color:rgba(255,255,255,.55);white-space:nowrap}
.tog{width:38px;height:21px;border-radius:11px;border:none;cursor:pointer;
      background:rgba(255,255,255,.14);position:relative;transition:background .25s;flex-shrink:0}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:15px;height:15px;
             border-radius:50%;background:#fff;transition:transform .25s}
html.light .tog{background:rgba(255,255,255,.3)}
html.light .tog::after{transform:translateX(17px);background:#f59e0b}

/* ── layout ── */
.layout{display:flex;min-height:calc(100vh - 68px)}

/* ── sidebar ── */
aside{
  width:255px;min-width:255px;background:var(--surf);border-right:1px solid var(--border);
  padding:8px 0;overflow-y:auto;max-height:calc(100vh - 68px);
  position:sticky;top:68px;transition:background .3s,border-color .3s;
}
.sb-title{font-size:9px;letter-spacing:2px;font-weight:700;color:var(--muted);
           text-transform:uppercase;padding:8px 15px 5px}
.prov-btn{width:100%;padding:8px 15px;background:none;border:none;font-family:'Sora',sans-serif;
           font-size:12.5px;font-weight:600;color:var(--sub);text-align:left;cursor:pointer;
           display:flex;align-items:center;justify-content:space-between;transition:all .15s}
.prov-btn:hover{color:var(--text);background:rgba(79,142,247,.06)}
.prov-btn.active{color:var(--gold)}
.prov-btn.open .arr{transform:rotate(90deg)}
.arr{transition:transform .2s;font-size:8px;opacity:.5}
.dot8{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:8px;flex-shrink:0}
.dist-list{overflow:hidden}
.dist-btn{width:100%;padding:7px 15px 7px 34px;background:none;
           border:none;border-left:2px solid transparent;font-family:'Sora',sans-serif;
           font-size:12px;color:var(--muted);text-align:left;cursor:pointer;
           display:flex;align-items:center;justify-content:space-between;transition:all .15s}
.dist-btn:hover{color:var(--text);background:rgba(79,142,247,.05)}
.dist-btn.active{color:var(--text);background:rgba(79,142,247,.08);
                  border-left-color:var(--blue);font-weight:600}
.cc{font-size:9.5px;background:rgba(138,163,192,.1);border-radius:8px;
     padding:1px 7px;color:var(--muted);margin-left:4px}

/* ── main panel ── */
main{flex:1;padding:20px 24px;overflow-y:auto;min-width:0}

/* ── stats row ── */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px;margin-bottom:20px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:10px;
        padding:13px 15px;transition:border-color .2s,background .3s}
.scard:hover{border-color:var(--blue)}
.slbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;
       font-weight:700;margin-bottom:5px}
.sval{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace}
.ssub{font-size:9.5px;color:var(--muted);margin-top:2px}

/* ── section header ── */
.sh{display:flex;align-items:center;gap:8px;margin-bottom:11px;margin-top:2px}
.sh h2{font-size:13.5px;font-weight:700}
.tag{background:rgba(232,200,74,.1);border:1px solid rgba(232,200,74,.2);
      color:var(--gold);border-radius:5px;padding:2px 8px;font-size:10px;font-weight:700}
html.light .tag{background:rgba(180,83,9,.08);border-color:rgba(180,83,9,.2);color:#b45309}

/* ── party summary ── */
.psumm{background:var(--card);border:1px solid var(--border);border-radius:10px;
        padding:14px 17px;margin-bottom:18px;transition:background .3s,border-color .3s}
.prow{display:flex;align-items:center;gap:10px;padding:5px 0;
       border-bottom:1px solid rgba(138,163,192,.05)}
.prow:last-child{border-bottom:none}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pname{font-size:11.5px;font-weight:500;min-width:185px;color:var(--text);
        white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pbw{flex:1;background:rgba(138,163,192,.08);border-radius:3px;height:6px;overflow:hidden}
.pb{height:100%;border-radius:3px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.pvot{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--muted);
       min-width:60px;text-align:right}
.pseat{font-family:'JetBrains Mono',monospace;font-size:10.5px;min-width:40px;
        text-align:right;font-weight:700}
.pseat.w{color:var(--green)}

/* ── constituency tabs ── */
.ctabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.ctab{padding:4px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;
       cursor:pointer;font-size:11px;font-weight:500;color:var(--muted);
       transition:all .15s;font-family:'Sora',sans-serif}
.ctab:hover{color:var(--text);border-color:var(--blue)}
.ctab.active{background:rgba(79,142,247,.1);border-color:var(--blue);color:var(--text);font-weight:600}

/* ── chart box ── */
.cbox{background:var(--card);border:1px solid var(--border);border-radius:10px;
       padding:15px 17px;margin-bottom:16px;transition:background .3s,border-color .3s}
.ctitle{font-size:9.5px;color:var(--muted);font-weight:700;letter-spacing:1px;
         text-transform:uppercase;margin-bottom:13px}
.hrow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.hlbl{font-size:11px;min-width:150px;text-align:right;color:var(--sub);
       white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .hpty{font-size:9.5px;font-weight:700;opacity:.65;margin-left:4px;letter-spacing:.3px}
.htrack{flex:1;background:rgba(138,163,192,.08);border-radius:3px;height:18px;overflow:hidden}
.hfill{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:6px;
        min-width:3px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.hfill span{font-size:9.5px;font-family:'JetBrains Mono',monospace;font-weight:700;
             color:rgba(255,255,255,.9);white-space:nowrap}
.hpct{font-family:'JetBrains Mono',monospace;font-size:10px;
       color:var(--muted);min-width:42px;text-align:right}

/* ── candidate cards ── */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));
        gap:10px;margin-bottom:20px}
.ccard{background:var(--card);border:1px solid var(--border);border-radius:10px;
        padding:12px 14px;display:flex;align-items:center;gap:10px;
        position:relative;overflow:hidden;transition:border-color .2s,transform .15s,background .3s}
.ccard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.ccard:hover{border-color:var(--blue);transform:translateY(-1px)}
.ccard.win{border-color:rgba(45,214,122,.3)}
.ccard.win::before{background:var(--green)}
.rnk{width:29px;height:29px;border-radius:50%;display:flex;align-items:center;
      justify-content:center;font-weight:700;font-size:11.5px;flex-shrink:0;
      font-family:'JetBrains Mono',monospace}
.r1{background:rgba(232,200,74,.14);color:var(--gold);border:1px solid rgba(232,200,74,.3)}
.r2{background:rgba(148,163,184,.08);color:#8ba3c0;border:1px solid rgba(148,163,184,.15)}
.r3{background:rgba(180,130,90,.08);color:#b4845a;border:1px solid rgba(180,130,90,.15)}
.rn{background:rgba(148,163,184,.04);color:var(--muted);border:1px solid var(--border)}
.ci{flex:1;min-width:0}
.cname{font-weight:600;font-size:12.5px;white-space:nowrap;overflow:hidden;
        text-overflow:ellipsis}
.cpty{font-size:10px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:4px}
.ptdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.cmeta{font-size:9.5px;color:var(--muted);margin-top:2px}
.cvr{text-align:right}
.vnum{font-family:'JetBrains Mono',monospace;font-size:13.5px;font-weight:700}
.vbar{margin-top:4px;background:rgba(138,163,192,.08);border-radius:2px;height:2px;width:65px}
.vbar-f{height:100%;border-radius:2px;transition:width .8s}
.crown{position:absolute;right:10px;top:8px;font-size:12px;opacity:.65}

/* ── breadcrumb ── */
.bc{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);
     margin-bottom:16px;flex-wrap:wrap}
.bc strong{color:var(--gold);font-weight:600}
.bsep{opacity:.3}

/* ── empty ── */
.empty{text-align:center;padding:100px 20px;color:var(--muted)}
.empty .ico{font-size:52px;margin-bottom:14px}
.empty p{font-size:13.5px}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* ── mobile sidebar toggle button ── */
.mob-sb-btn{display:none;position:fixed;bottom:20px;left:20px;z-index:300;
  background:var(--blue);color:#fff;border:none;border-radius:50%;
  width:48px;height:48px;font-size:20px;cursor:pointer;
  box-shadow:0 4px 16px rgba(79,142,247,.5);align-items:center;justify-content:center}
.mob-sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:250;opacity:0;transition:opacity .25s}
.mob-sb-overlay.open{opacity:1}

@media(max-width:700px){
  header{padding:10px 14px}
  .hd-title h1{font-size:13px}
  .hd-title p{display:none}
  .tog-label{display:none}
  .live-pill{padding:3px 8px;font-size:8.5px}
  main{padding:12px 14px}
  .mob-sb-btn{display:flex}
  aside{
    position:fixed;left:-270px;top:0;bottom:0;z-index:260;
    width:260px;max-height:100vh;
    box-shadow:4px 0 24px rgba(0,0,0,.4);
    transition:left .28s cubic-bezier(.4,0,.2,1);
  }
  aside.open{left:0}
  .mob-sb-overlay{display:block}
  .layout{display:block}
  .stats{grid-template-columns:1fr 1fr;gap:8px}
  .sval{font-size:17px}
  .cgrid{grid-template-columns:1fr}
  .pname{min-width:120px}
  .hlbl{min-width:100px;font-size:10px}
  .hpct{min-width:32px;font-size:9px}
  .ctab{font-size:10px;padding:4px 9px}
  .empty{padding:60px 16px}
}
</style>
</head>

arty": "आम जनता पार्टी(एकल चुनाव चिन्ह)", "Votes Received": 2, "Province": "कर्णाली प्रदेश", "District": "रुकुम (पश्चिम भाग)", "Constituency": "निर्वाचन क्षेत्र नं. 1", "Age": "44", "Gender": "Female", "Status": ""}, {"Candidate Name": "धन बहादुर वि.क.", "Political Party": "नेपाल मजदुर किसान पार्टी", "Votes Received": 0, "Province": "कर्णाली प्रदेश", "District": "रुकुम (पश्चिम भाग)", "Constituency": "निर्वाचन क्षेत्र नं. 1", "Age": "43", "Gender": "Male", "Status": ""}];

/* ── normalise ──────────────────────────────────────────────────────────── */
const data = RAW.map(r => ({...r, _v: parseInt(r['Votes Received'])||0}));

const provinces = [...new Set(data.map(r=>r.Province))];
const distsByProv = {};
provinces.forEach(p=>{distsByProv[p]=[...new Set(data.filter(r=>r.Province===p).map(r=>r.District))]});
const constsByDist = {};
data.forEach(r=>{if(!constsByDist[r.District])constsByDist[r.District]=new Set();constsByDist[r.District].add(r.Constituency)});

function partyTotals(rows){
  const t={};
  rows.forEach(r=>{t[r['Political Party']]=(t[r['Political Party']]||0)+r._v});
  return Object.entries(t).sort((a,b)=>b[1]-a[1]);
}
function seatsWon(rows){
  const s={},bc={};
  rows.forEach(r=>{if(!bc[r.Constituency])bc[r.Constituency]=[];bc[r.Constituency].push(r)});
  Object.values(bc).forEach(cs=>{
    const w=cs.reduce((a,b)=>a._v>b._v?a:b);
    s[w['Political Party']]=(s[w['Political Party']]||0)+1;
  });
  return s;
}
function fmtV(n){return n>=1000?(n/1000).toFixed(1)+'K':n}

// First full Devanagari syllable of each word as abbreviation
function abbrParty(name){
  if(!name) return '';
  const words=name.trim().split(' ').filter(x=>x);
  if(words.length===1) return name;
  return words.map(w=>{
    if(!w) return '';
    // standalone vowel
    const sv=w.match(/^[ऄ-औॠॡ]/u);
    if(sv) return sv[0];
    // consonant cluster + optional matra
    const m=w.match(/^[क-हक़-य़](?:्[क-हक़-य़])*[ा-ौॎॏ]?/u);
    return m ? m[0] : w[0];
  }).join('');
}

/* ── main render ─────────────────────────────────────────────────────────── */
function renderMain(){
  const main=document.getElementById('main');
  if(!selProv&&!selDist){main.innerHTML='<div class="empty"><div class="ico">🗳️</div><p>Select a province or district from the sidebar</p></div>';return}
  const rows=selDist?data.filter(r=>r.District===selDist):data.filter(r=>r.Province===selProv);
  const consts=[...new Set(rows.map(r=>r.Constituency))].sort((a,b)=>{
    const ai=parseInt(a.match(/[0-9]+$/)?.[0]||0),bi=parseInt(b.match(/[0-9]+$/)?.[0]||0);
    return ai===bi?a.localeCompare(b):ai-bi;
  });
  const pts=partyTotals(rows),seats=seatsWon(rows);
  const total=rows.reduce((s,r)=>s+r._v,0);
  const maxV=pts[0]?pts[0][1]:1;
  const scope=selDist||selProv;
  const bc=selDist
    ?`<strong>${selProv}</strong><span class="bsep">›</span><strong>${selDist}</strong>`
    :`<strong>${selProv}</strong>`;

  main.innerHTML=`
    <div class="bc">🗺️&nbsp;${bc}&nbsp;·&nbsp;${consts.length} constituencies&nbsp;·&nbsp;${rows.length} candidates</div>
    <div class="stats">
      <div class="scard"><div class="slbl">Total Votes</div><div class="sval">${fmtV(total)}</div><div class="ssub">cast in region</div></div>
      <div class="scard"><div class="slbl">Constituencies</div><div class="sval">${consts.length}</div><div class="ssub">in selection</div></div>
      <div class="scard"><div class="slbl">Candidates</div><div class="sval">${rows.length}</div><div class="ssub">competing</div></div>
      <div class="scard"><div class="slbl">Parties</div><div class="sval">${pts.length}</div><div class="ssub">represented</div></div>
    </div>
    <div class="sh"><h2>Party Standings</h2><span class="tag">${scope}</span></div>
    <div class="psumm">
      ${pts.map(([p,v])=>{
        const pct=((v/maxV)*100).toFixed(1),s=seats[p]||0;
        return `<div class="prow">
          <span class="pdot" style="background:${pc(p)}"></span>
          <span class="pname">${p}</span>
          <div class="pbw"><div class="pb" style="width:${pct}%;background:${pc(p)}"></div></div>
          <span class="pvot">${fmtV(v)}</span>
          <span class="pseat${s?' w':''}">${s?s+' 🏆':''}</span>
        </div>`;
      }).join('')}
    </div>
    <div class="sh"><h2>Constituencies</h2></div>
    <div class="ctabs" id="ctabs">
      ${consts.map((c,i)=>`<button class="ctab${i===0?' active':''}" data-c="${c}">${c}</button>`).join('')}
    </div>
    <div id="cdetail"></div>`;

  showConst(consts[0],rows);
  main.querySelectorAll('.ctab').forEach(b=>b.addEventListener('click',()=>{
    main.querySelectorAll('.ctab').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');showConst(b.dataset.c,rows);
  }));
}

function showConst(cname,rows){
  const det=document.getElementById('cdetail');if(!det)return;
  const cs=rows.filter(r=>r.Constituency===cname).sort((a,b)=>b._v-a._v);
  const mx=cs[0]?._v||1,tot=cs.reduce((s,r)=>s+r._v,0);
  det.innerHTML=`
    <div class="cbox">
      <div class="ctitle">Vote Count — ${cname}</div>
      ${cs.map(c=>{
        const pct=((c._v/mx)*100).toFixed(1),sh=tot?((c._v/tot)*100).toFixed(1):'0';
        const abbr=abbrParty(c['Political Party']);
        return `<div class="hrow">
          <div class="hlbl" title="${c['Candidate Name']} (${c['Political Party']})">${c['Candidate Name']} <span class="hpty">${abbr}</span></div>
          <div class="htrack"><div class="hfill" style="width:${pct}%;background:${pc(c['Political Party'])}">
            <span>${c._v.toLocaleString()}</span></div></div>
          <div class="hpct">${sh}%</div>
        </div>`;
      }).join('')}
    </div>
    <div class="sh"><h2>Candidates</h2><span class="tag">${cname}</span></div>
    <div class="cgrid">
      ${cs.map((c,i)=>{
        const rk=i+1,rc=rk===1?'r1':rk===2?'r2':rk===3?'r3':'rn';
        const p=Math.round(mx?c._v/mx*100:0);
        return `<div class="ccard${rk===1?' win':''}">
          ${rk===1?'<span class="crown">👑</span>':''}
          <div class="rnk ${rc}">#${rk}</div>
          <div class="ci">
            <div class="cname">${c['Candidate Name']}</div>
            <div class="cpty"><span class="ptdot" style="background:${pc(c['Political Party'])}"></span>${c['Political Party']}</div>
            ${c.Age||c.Gender?`<div class="cmeta">${[c.Age?'Age: '+c.Age:'',c.Gender].filter(Boolean).join(' · ')}</div>`:''}</div>
          <div class="cvr">
            <div class="vnum" style="color:${pc(c['Political Party'])}">${c._v.toLocaleString()}</div>
            <div class="vbar"><div class="vbar-f" style="width:${p}%;background:${pc(c['Political Party'])}"></div></div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}
