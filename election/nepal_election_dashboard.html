<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nepal Election 2082 – Live Results</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

/* ── theme tokens ── */
:root{
  --bg:#0a0c10;--surf:#0f1219;--card:#141720;--border:#1e2535;
  --text:#f0f2f7;--muted:#4a5a72;--sub:#7a90b0;
  --gold:#f5c842;--accent:#ff4d6d;--blue:#3d8ef0;--green:#22d472;--red:#ff4d6d;
  --shadow:rgba(0,0,0,.7);
  --header-bg:#0a0c10;
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
}
html.light{
  --bg:#f4f5f8;--surf:#fff;--card:#fff;--border:#e0e5ef;
  --text:#0f1728;--muted:#8090aa;--sub:#4a6080;
  --gold:#c9940a;--blue:#1e6de0;--green:#12a850;--red:#e02040;
  --shadow:rgba(0,0,0,.1);
  --header-bg:#0f1728;
}

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;transition:background .3s,color .3s;}

/* ── header ── */
header{
  background:var(--header-bg);
  border-bottom:1px solid var(--border);
  padding:0 24px;height:58px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;gap:12px;
}
.hd-left{display:flex;align-items:center;gap:14px;min-width:0}
.flag-stripe{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.flag-stripe span{display:block;width:3px;height:10px;border-radius:2px}
.flag-stripe span:nth-child(1){background:#003893;height:14px}
.flag-stripe span:nth-child(2){background:#dc143c;height:14px}
.hd-title h1{font-family:var(--font-display);font-size:22px;letter-spacing:1.5px;color:#fff;line-height:1;white-space:nowrap}
.hd-title h1 em{color:var(--gold);font-style:normal}
.hd-title p{font-size:10px;color:rgba(255,255,255,.38);margin-top:3px;font-family:var(--font-mono);letter-spacing:.4px;white-space:nowrap}
.hd-right{display:flex;align-items:center;gap:9px;flex-shrink:0}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(34,212,114,.08);border:1px solid rgba(34,212,114,.25);border-radius:4px;padding:5px 12px;font-size:9px;font-weight:700;color:#22d472;letter-spacing:1.5px;font-family:var(--font-mono)}
.dot{width:5px;height:5px;border-radius:50%;background:#22d472;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.2;transform:scale(1.8)}}
.tog-row{display:flex;align-items:center;gap:6px}
.tog-label{font-size:10px;color:rgba(255,255,255,.4);white-space:nowrap}
.tog{width:42px;height:24px;border-radius:12px;border:none;cursor:pointer;background:rgba(255,255,255,.1);position:relative;transition:background .25s;flex-shrink:0;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .25s}
html.light .tog{background:rgba(255,255,255,.2)}
html.light .tog::after{transform:translateX(17px);background:var(--gold)}

/* ── layout ── */
.layout{display:flex;min-height:calc(100vh - 58px)}

/* ── sidebar ── */
aside{
  width:250px;min-width:250px;background:var(--surf);border-right:1px solid var(--border);
  padding:6px 0;overflow-y:auto;max-height:calc(100vh - 58px);
  position:sticky;top:58px;transition:background .3s,border-color .3s;
}
.sb-title{font-size:8px;letter-spacing:2.5px;font-weight:700;color:var(--muted);text-transform:uppercase;padding:10px 16px 6px;font-family:var(--font-mono)}
.prov-btn{width:100%;padding:11px 16px;background:none;border:none;font-family:var(--font-body);font-size:12.5px;font-weight:600;color:var(--sub);text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .15s;touch-action:manipulation;}
.prov-btn:hover{color:var(--text);background:rgba(61,142,240,.06)}
.prov-btn.active{color:var(--gold)}
.prov-btn.open .arr{transform:rotate(90deg)}
.arr{transition:transform .2s;font-size:7px;opacity:.4}
.dot8{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:8px;flex-shrink:0}
.dist-list{overflow:hidden}
.dist-btn{width:100%;padding:10px 16px 10px 32px;background:none;border:none;border-left:2px solid transparent;font-family:var(--font-body);font-size:11.5px;color:var(--muted);text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .15s;}
.dist-btn:hover{color:var(--text);background:rgba(61,142,240,.05)}
.dist-btn.active{color:var(--text);background:rgba(61,142,240,.07);border-left-color:var(--blue);font-weight:600}
.cc{font-size:9px;background:rgba(122,144,176,.1);border-radius:4px;padding:1px 6px;color:var(--muted);margin-left:4px;font-family:var(--font-mono)}

/* ── main panel ── */
main{flex:1;padding:24px 28px;overflow-y:auto;min-width:0}

/* ── stats row ── */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:22px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;transition:border-color .2s,background .3s}
.scard:hover{border-color:var(--blue)}
.slbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:5px;font-family:var(--font-mono)}
.sval{font-size:22px;font-weight:700;font-family:var(--font-mono)}
.ssub{font-size:9px;color:var(--muted);margin-top:2px}

/* ── section header ── */
.sh{display:flex;align-items:center;gap:8px;margin-bottom:13px;margin-top:2px}
.sh h2{font-family:var(--font-display);font-size:18px;letter-spacing:1px}
.tag{background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.2);color:var(--gold);border-radius:4px;padding:2px 9px;font-size:9px;font-weight:700;font-family:var(--font-mono);letter-spacing:.5px}
html.light .tag{background:rgba(201,148,10,.08);border-color:rgba(201,148,10,.2);color:var(--gold)}

/* ── party summary (district/province view) ── */
.psumm{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 17px;margin-bottom:20px;transition:background .3s,border-color .3s}
.prow{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid rgba(122,144,176,.05)}
.prow:last-child{border-bottom:none}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pname{font-size:11.5px;font-weight:500;min-width:185px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pbw{flex:1;background:rgba(122,144,176,.08);border-radius:2px;height:5px;overflow:hidden}
.pb{height:100%;border-radius:2px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.pvot{font-family:var(--font-mono);font-size:10px;color:var(--muted);min-width:60px;text-align:right}
.pseat{font-family:var(--font-mono);font-size:10px;min-width:40px;text-align:right;font-weight:700}
.pseat.w{color:var(--green)}

/* ── constituency tabs ── */
.ctabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.ctab{padding:5px 12px;background:var(--card);border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:11px;font-weight:500;color:var(--muted);transition:all .15s;font-family:var(--font-body)}
.ctab:hover{color:var(--text);border-color:var(--blue)}
.ctab.active{background:rgba(61,142,240,.1);border-color:var(--blue);color:var(--text);font-weight:600}

/* ── chart box ── */
.cbox{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:16px;transition:background .3s,border-color .3s}
.ctitle{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;font-family:var(--font-mono)}
.hrow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.hlbl{font-size:11px;min-width:150px;text-align:right;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hpty{font-size:9px;font-weight:700;opacity:.6;margin-left:4px;letter-spacing:.3px}
.htrack{flex:1;background:rgba(122,144,176,.07);border-radius:2px;height:18px;overflow:hidden}
.hfill{height:100%;border-radius:2px;display:flex;align-items:center;padding-left:6px;min-width:3px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.hfill span{font-size:9.5px;font-family:var(--font-mono);font-weight:500;color:rgba(255,255,255,.9);white-space:nowrap}
.hpct{font-family:var(--font-mono);font-size:10px;color:var(--muted);min-width:42px;text-align:right}

/* ── candidate cards ── */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:10px;margin-bottom:20px}
.ccard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden;transition:border-color .2s,transform .15s,background .3s}
.ccard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.ccard:hover{border-color:var(--blue);transform:translateY(-1px)}
.ccard.win{border-color:rgba(34,212,114,.3)}
.ccard.win::before{background:var(--green)}
.rnk{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0;font-family:var(--font-mono)}
.r1{background:rgba(245,200,66,.12);color:var(--gold);border:1px solid rgba(245,200,66,.25)}
.r2{background:rgba(148,163,184,.07);color:#8ba3c0;border:1px solid rgba(148,163,184,.14)}
.r3{background:rgba(180,130,90,.07);color:#b4845a;border:1px solid rgba(180,130,90,.14)}
.rn{background:rgba(148,163,184,.03);color:var(--muted);border:1px solid var(--border)}
.ci{flex:1;min-width:0}
.cname{font-weight:600;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cpty{font-size:10px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:4px}
.ptdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.cmeta{font-size:9.5px;color:var(--muted);margin-top:2px}
.cvr{text-align:right}
.vnum{font-family:var(--font-mono);font-size:13px;font-weight:700}
.vbar{margin-top:4px;background:rgba(122,144,176,.08);border-radius:2px;height:2px;width:65px}
.vbar-f{height:100%;border-radius:2px;transition:width .8s}
.crown{position:absolute;right:10px;top:8px;font-size:12px;opacity:.6}

/* ── breadcrumb ── */
.bc{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);margin-bottom:18px;flex-wrap:wrap;font-family:var(--font-mono)}
.bc strong{color:var(--gold);font-weight:600}
.bsep{opacity:.3}

/* ── empty ── */
.empty{text-align:center;padding:80px 20px;color:var(--muted)}
.empty .ico{font-size:52px;margin-bottom:14px}
.empty p{font-size:13.5px}

/* ══════════════════════════════════════════
   HOME PAGE — BOLD PARTY CARDS REDESIGN
══════════════════════════════════════════ */
.home-wrap{max-width:1100px;margin:0 auto;padding-bottom:40px}

/* top banner */
.home-banner{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,#0d1020 0%,#141830 50%,#0a0d18 100%);
  border:1px solid var(--border);border-radius:14px;
  padding:32px 36px;margin-bottom:28px;
}
.home-banner::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 80% at 80% 50%,rgba(245,200,66,.06) 0%,transparent 70%);
  pointer-events:none;
}
.home-banner-grid{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center}
.home-banner-left h2{
  font-family:var(--font-display);font-size:48px;letter-spacing:3px;
  color:#fff;line-height:.95;margin-bottom:8px;
}
.home-banner-left h2 em{color:var(--gold);font-style:normal}
.home-banner-left p{font-size:12px;color:rgba(255,255,255,.4);font-family:var(--font-mono);letter-spacing:.5px}
.home-banner-stats{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.hbs-item{text-align:right}
.hbs-num{font-family:var(--font-display);font-size:36px;color:var(--gold);letter-spacing:2px;line-height:1}
.hbs-lbl{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:1.5px;text-transform:uppercase;font-family:var(--font-mono)}
.nepal-flag-decor{position:absolute;right:200px;top:50%;transform:translateY(-50%);opacity:.04;font-size:120px;pointer-events:none;user-select:none}

/* section label */
.section-label{
  display:flex;align-items:center;gap:12px;margin-bottom:16px;
}
.section-label span{font-family:var(--font-display);font-size:22px;letter-spacing:1.5px;color:var(--text)}
.section-label-line{flex:1;height:1px;background:var(--border)}
.section-sublabel{font-size:9px;color:var(--muted);font-family:var(--font-mono);letter-spacing:1px}

/* ── HERO PARTY CARDS (top 3) ── */
.hero-grid{
  display:grid;
  grid-template-columns:2fr 1fr 1fr;
  gap:12px;
  margin-bottom:12px;
}
.party-hero{
  position:relative;overflow:hidden;
  border-radius:12px;
  border:1px solid transparent;
  padding:24px;
  cursor:default;
  transition:transform .2s,box-shadow .2s;
  min-height:170px;
  display:flex;flex-direction:column;justify-content:space-between;
}
.party-hero:hover{transform:translateY(-2px)}
.party-hero-1{
  background:linear-gradient(140deg,#0a1020 0%,#0d1428 100%);
  border-color:rgba(61,142,240,.2);
  box-shadow:0 0 40px rgba(61,142,240,.05);
}
.party-hero-2{
  background:linear-gradient(140deg,#0f1a10 0%,#0a1a12 100%);
  border-color:rgba(34,212,114,.2);
}
.party-hero-3{
  background:linear-gradient(140deg,#1a1210 0%,#140e0a 100%);
  border-color:rgba(249,115,22,.15);
}
.ph-glow{
  position:absolute;inset:0;pointer-events:none;border-radius:12px;
  opacity:.12;
}
.party-hero-1 .ph-glow{background:radial-gradient(ellipse 80% 80% at 0% 100%,#3d8ef0 0%,transparent 70%)}
.party-hero-2 .ph-glow{background:radial-gradient(ellipse 80% 80% at 0% 100%,#22d472 0%,transparent 70%)}
.party-hero-3 .ph-glow{background:radial-gradient(ellipse 80% 80% at 0% 100%,#f97316 0%,transparent 70%)}
.ph-rank{
  position:absolute;right:18px;top:14px;
  font-family:var(--font-display);font-size:64px;line-height:1;
  opacity:.06;letter-spacing:-2px;
}
.ph-top{position:relative;z-index:1}
.ph-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  font-family:var(--font-mono);padding:3px 9px;border-radius:3px;margin-bottom:10px;
}
.party-hero-1 .ph-badge{background:rgba(61,142,240,.12);color:#3d8ef0;border:1px solid rgba(61,142,240,.2)}
.party-hero-2 .ph-badge{background:rgba(34,212,114,.12);color:#22d472;border:1px solid rgba(34,212,114,.2)}
.party-hero-3 .ph-badge{background:rgba(249,115,22,.12);color:#f97316;border:1px solid rgba(249,115,22,.2)}
.ph-name{font-size:13px;font-weight:700;line-height:1.35;color:#fff;margin-bottom:0;max-width:85%}
.ph-bottom{position:relative;z-index:1}
.ph-seats-row{display:flex;align-items:baseline;gap:6px;margin-bottom:8px}
.ph-seats-num{font-family:var(--font-display);font-size:52px;line-height:1;letter-spacing:-1px}
.party-hero-1 .ph-seats-num{color:#3d8ef0}
.party-hero-2 .ph-seats-num{color:#22d472}
.party-hero-3 .ph-seats-num{color:#f97316}
.ph-seats-lbl{font-size:10px;color:rgba(255,255,255,.4);font-family:var(--font-mono);letter-spacing:.5px}
.ph-bar-track{width:100%;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.ph-bar-fill{height:100%;border-radius:2px;transition:width 1.4s cubic-bezier(.4,0,.2,1)}
.party-hero-1 .ph-bar-fill{background:linear-gradient(90deg,#3d8ef0,#1e6dc8)}
.party-hero-2 .ph-bar-fill{background:linear-gradient(90deg,#22d472,#1aaa58)}
.party-hero-3 .ph-bar-fill{background:linear-gradient(90deg,#f97316,#c75e0a)}
.ph-pct{font-family:var(--font-mono);font-size:9px;color:rgba(255,255,255,.3);margin-top:4px}
.ph-won-leading{display:flex;align-items:center;gap:7px;margin-bottom:7px;flex-wrap:wrap}
.ph-won-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;letter-spacing:.8px;font-family:var(--font-mono);padding:3px 8px;border-radius:3px;background:rgba(34,212,114,.13);color:#22d472;border:1px solid rgba(34,212,114,.25)}
.ph-leading-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;letter-spacing:.8px;font-family:var(--font-mono);padding:3px 8px;border-radius:3px;background:rgba(245,200,66,.09);color:var(--gold);border:1px solid rgba(245,200,66,.2)}
.party-hero-1 .ph-won-num{color:#3d8ef0}
.party-hero-2 .ph-won-num{color:#22d472}
.party-hero-3 .ph-won-num{color:#f97316}
.party-hero-1 .ph-lead-num{color:#3d8ef0}
.party-hero-2 .ph-lead-num{color:#22d472}
.party-hero-3 .ph-lead-num{color:#f97316}
.party-hero-1 .ph-won-fill{background:#3d8ef0!important}
.party-hero-2 .ph-won-fill{background:#22d472!important}
.party-hero-3 .ph-won-fill{background:#f97316!important}
.party-hero-1 .ph-lead-fill{background:#3d8ef0!important;opacity:.35}
.party-hero-2 .ph-lead-fill{background:#22d472!important;opacity:.35}
.party-hero-3 .ph-lead-fill{background:#f97316!important;opacity:.35}

/* ── RANKED LIST (positions 4+) ── */
.party-list{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:28px}
.pl-row{
  display:flex;align-items:center;gap:12px;
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:13px 16px;
  position:relative;overflow:hidden;
  transition:border-color .18s,transform .15s;
  cursor:default;
}
.pl-row:hover{border-color:var(--blue);transform:translateX(2px)}
.pl-fill{
  position:absolute;left:0;top:0;bottom:0;
  border-radius:10px 0 0 10px;opacity:.05;
  transition:width 1.2s cubic-bezier(.4,0,.2,1);
}
.pl-rank{
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;font-family:var(--font-mono);
  flex-shrink:0;background:rgba(122,144,176,.06);
  color:var(--muted);border:1px solid var(--border);
  position:relative;z-index:1;
}
.pl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;position:relative;z-index:1}
.pl-name{flex:1;font-size:12px;font-weight:600;color:var(--text);min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:relative;z-index:1}
.pl-right{display:flex;align-items:center;gap:8px;flex-shrink:0;position:relative;z-index:1}
.pl-seats{font-family:var(--font-display);font-size:22px;letter-spacing:.5px;line-height:1}
.pl-wl{display:flex;align-items:center;gap:4px;flex-shrink:0}
.pl-won{font-family:var(--font-mono);font-size:9px;font-weight:700;color:#22d472;background:rgba(34,212,114,.1);border:1px solid rgba(34,212,114,.2);border-radius:3px;padding:1px 5px;letter-spacing:.4px}
.pl-lead{font-family:var(--font-mono);font-size:9px;font-weight:700;color:var(--gold);background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.18);border-radius:3px;padding:1px 5px;letter-spacing:.4px}
.pl-pct{font-size:9px;color:var(--muted);font-family:var(--font-mono)}
/* ── TOTAL BAR across bottom ── */
.total-bar-section{margin-bottom:28px}
.total-bar-track{
  height:28px;background:rgba(122,144,176,.06);
  border-radius:8px;overflow:hidden;display:flex;
  border:1px solid var(--border);
}
.total-bar-seg{
  height:100%;transition:width 1.5s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.total-bar-seg:first-child{border-radius:7px 0 0 7px}
.total-bar-seg:last-child{border-radius:0 7px 7px 0}
.total-bar-legend{display:flex;flex-wrap:wrap;gap:10px 18px;margin-top:10px}
.tbl-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--sub)}
.tbl-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* home hint */
.home-hint{text-align:center;padding:12px 0;font-size:11px;color:var(--muted);font-family:var(--font-mono);letter-spacing:.3px;border-top:1px solid var(--border);margin-top:4px}

/* ── seat board (legacy, used in province/district view) ── */
.seat-board{margin:0 0 24px}
.seat-board-title{font-size:8px;letter-spacing:2px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-family:var(--font-mono)}
.seat-board-title span{flex:1;height:1px;background:var(--border)}
.party-row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:0;padding:10px 16px;margin-bottom:6px;background:var(--card);border:1px solid var(--border);border-radius:10px;position:relative;overflow:hidden;transition:border-color .2s,transform .15s;cursor:default;}
.party-row:hover{border-color:var(--blue);transform:translateX(3px)}
.party-row-fill{position:absolute;left:0;top:0;bottom:0;border-radius:10px 0 0 10px;opacity:.06;transition:width 1.2s cubic-bezier(.4,0,.2,1);}
.party-row-left{display:flex;align-items:center;gap:10px;position:relative;z-index:1;min-width:0}
.party-rank{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:var(--font-mono);flex-shrink:0;}
.party-rank.r1{background:rgba(245,200,66,.12);color:var(--gold);border:1px solid rgba(245,200,66,.25)}
.party-rank.r2{background:rgba(148,163,184,.07);color:#8ba3c0;border:1px solid rgba(148,163,184,.18)}
.party-rank.r3{background:rgba(180,130,90,.07);color:#b4845a;border:1px solid rgba(180,130,90,.18)}
.party-rank.rn{background:rgba(148,163,184,.03);color:var(--muted);border:1px solid var(--border)}
.party-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.party-name{font-size:12.5px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.party-row-right{display:flex;align-items:center;gap:10px;position:relative;z-index:1;flex-shrink:0}
.seat-pill{display:flex;align-items:center;gap:3px;font-family:var(--font-mono);}
.seat-num{font-size:17px;font-weight:700;line-height:1;min-width:24px;text-align:right}
.seat-sep{font-size:12px;color:var(--border);font-weight:400}
.seat-denom{font-size:11px;color:var(--muted);font-weight:500}
.seat-pct{font-family:var(--font-mono);font-size:10px;color:var(--muted);min-width:36px;text-align:right}
.seat-bar-wrap{width:60px;height:4px;background:rgba(122,144,176,.1);border-radius:2px;overflow:hidden;flex-shrink:0}
.seat-bar{height:100%;border-radius:2px;width:0%}
.seat-board-header{display:flex;justify-content:space-between;align-items:center;padding:4px 16px 8px;font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-family:var(--font-mono);}
.sbh-left{flex:1}
.sbh-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.sbh-right span:nth-child(1){width:60px;text-align:center}
.sbh-right span:nth-child(2){width:80px;text-align:center}
.sbh-right span:nth-child(3){width:36px;text-align:right}
.home-total{display:inline-flex;align-items:center;gap:8px;background:rgba(61,142,240,.07);border:1px solid rgba(61,142,240,.18);border-radius:4px;padding:5px 16px;margin-top:8px;font-size:10px;color:var(--blue);font-weight:600;font-family:var(--font-mono)}

.hd-title:hover h1 em{opacity:.8;transition:opacity .15s}
.hd-title:hover p{color:rgba(255,255,255,.55);transition:color .15s}

::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── PARLIAMENT BAR ── */
.parl-bar-wrap{margin-bottom:20px}
.parl-bar-track{height:36px;border-radius:8px;overflow:hidden;display:flex;border:1px solid var(--border);background:rgba(122,144,176,.04)}
.parl-seg{height:100%;transition:width 1.2s cubic-bezier(.4,0,.2,1);position:relative}
.parl-seg:first-child{border-radius:7px 0 0 7px}
.parl-seg:last-child{border-radius:0 7px 7px 0}

/* ── HERO CARD DUAL-STAT ── */
.ph-dual-stats{display:flex;align-items:stretch;gap:0;margin-bottom:10px;background:rgba(0,0,0,.2);border-radius:8px;overflow:hidden}
.ph-won-block{flex:1;padding:10px 12px;text-align:center}
.ph-lead-block{flex:1;padding:10px 12px;text-align:center;background:rgba(0,0,0,.15)}
.ph-divider{width:1px;background:rgba(255,255,255,.06)}
.ph-won-num{font-family:var(--font-display);font-size:42px;line-height:1;letter-spacing:-1px;color:#22d472}
.ph-won-lbl{font-size:8px;font-weight:700;letter-spacing:1.5px;color:#22d472;opacity:.7;font-family:var(--font-mono);margin-top:2px}
.ph-lead-num{font-family:var(--font-display);font-size:28px;line-height:1;letter-spacing:-1px;color:var(--gold)}
.ph-lead-lbl{font-size:8px;font-weight:700;letter-spacing:1.5px;color:var(--gold);opacity:.7;font-family:var(--font-mono);margin-top:2px}
.ph-stacked-bar{position:relative;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:visible;margin-bottom:6px}
.ph-won-fill{position:absolute;left:0;top:0;height:100%;border-radius:2px;z-index:2}
.ph-lead-fill{position:absolute;left:0;top:0;height:100%;border-radius:2px;z-index:1}
.ph-total-line{font-size:9px;color:rgba(255,255,255,.25);font-family:var(--font-mono);letter-spacing:.3px}
.ph-total-line strong{color:rgba(255,255,255,.45)}

/* ── PARTY TABLE ── */
.pt-table{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px}
.pt-head{display:grid;grid-template-columns:28px 10px 1fr 120px 52px;gap:0 8px;padding:9px 14px;background:rgba(122,144,176,.04);border-bottom:1px solid var(--border);font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-family:var(--font-mono);align-items:center}
.pt-row{display:grid;grid-template-columns:28px 10px 1fr 120px 52px;gap:0 8px;padding:10px 14px;border-bottom:1px solid rgba(122,144,176,.04);align-items:center;transition:background .12s}
.pt-row:last-child{border-bottom:none}
.pt-row:hover{background:rgba(61,142,240,.04)}
.pt-rank{font-size:10px;font-weight:700;font-family:var(--font-mono);color:var(--muted);text-align:right}
.pt-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pt-name{font-size:11.5px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pt-bar-col{min-width:0}
.pt-bar-track{height:6px;background:rgba(122,144,176,.1);border-radius:3px;overflow:hidden;position:relative}
.pt-won-bar{position:absolute;left:0;top:0;height:100%;border-radius:3px;z-index:2}
.pt-lead-bar{position:absolute;left:0;top:0;height:100%;border-radius:3px;z-index:1}
.pt-won-num{font-family:var(--font-mono);font-size:13px;font-weight:700;text-align:right}
.pt-lead-num{font-family:var(--font-mono);font-size:12px;color:var(--muted);text-align:right}
.pt-total{font-family:var(--font-mono);font-size:10px;color:var(--muted);text-align:right}

@media(max-width:900px){
  .pt-head{grid-template-columns:24px 10px 1fr 80px 44px}
  .pt-row{grid-template-columns:24px 10px 1fr 80px 44px}
}
@media(max-width:700px){
  .ph-dual-stats{flex-direction:row}
  .ph-won-num{font-size:32px}
  .ph-lead-num{font-size:22px}
  .pt-head{grid-template-columns:20px 8px 1fr 60px 40px}
  .pt-row{grid-template-columns:20px 8px 1fr 60px 40px}
  .pt-head>:last-child,.pt-row>.pt-total{display:none}
  .pt-name{font-size:10px}
  .pt-won-num{font-size:11px}
  .pt-lead-num{font-size:10px}
}

/* ── PR TAB STYLES ── */
.view-tabs{display:flex;gap:0;margin-bottom:24px;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--surf)}
.view-tab{flex:1;padding:11px 0;border:none;background:none;cursor:pointer;font-family:var(--font-body);font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.4px;transition:all .18s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.view-tab:not(:last-child){border-right:1px solid var(--border)}
.view-tab:hover{color:var(--text);background:rgba(61,142,240,.05)}
.view-tab.active{color:var(--gold);background:rgba(245,200,66,.06)}

/* PR banner */
.pr-banner{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,#0d1020 0%,#141830 50%,#0a0d18 100%);
  border:1px solid var(--border);border-radius:14px;
  padding:32px 36px;margin-bottom:28px;
}
.pr-banner::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 80% at 80% 50%,rgba(61,142,240,.07) 0%,transparent 70%);
  pointer-events:none;
}
.pr-banner-grid{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center}
.pr-banner-left h2{font-family:var(--font-display);font-size:48px;letter-spacing:3px;color:#fff;line-height:.95;margin-bottom:8px}
.pr-banner-left h2 em{color:#3d8ef0;font-style:normal}
.pr-banner-left p{font-size:12px;color:rgba(255,255,255,.4);font-family:var(--font-mono);letter-spacing:.5px}
.pr-banner-stats{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.pr-flag-decor{position:absolute;right:200px;top:50%;transform:translateY(-50%);opacity:.04;font-size:120px;pointer-events:none;user-select:none}

/* donut + top-parties row */
.pr-main-grid{display:grid;grid-template-columns:260px 1fr;gap:18px;margin-bottom:22px}

/* donut */
.pr-donut-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;flex-direction:column;align-items:center}
.pr-donut-wrap{position:relative;width:180px;height:180px;flex-shrink:0;margin-bottom:14px}
.pr-donut-wrap svg{width:180px;height:180px;transform:rotate(-90deg)}
.pr-donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.pr-donut-total{font-family:var(--font-display);font-size:28px;color:var(--text);letter-spacing:1px;line-height:1}
.pr-donut-lbl{font-size:8px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-family:var(--font-mono)}
.pr-legend{width:100%;display:flex;flex-direction:column;gap:5px}
.pr-leg-item{display:flex;align-items:center;gap:7px;font-size:10.5px;color:var(--sub);cursor:default}
.pr-leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pr-leg-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pr-leg-pct{font-family:var(--font-mono);font-size:9px;color:var(--muted);flex-shrink:0}

/* horizontal bar list */
.pr-bars-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;overflow:hidden;min-width:0}
.pr-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;min-width:0}
.pr-bar-row:last-child{margin-bottom:0}
.pr-bar-rank{width:20px;font-size:9px;font-weight:700;font-family:var(--font-mono);color:var(--muted);text-align:right;flex-shrink:0}
.pr-bar-name{font-size:11.5px;font-weight:600;color:var(--text);min-width:0;flex:0 0 200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pr-bar-track{flex:1;min-width:0;height:20px;background:rgba(122,144,176,.07);border-radius:3px;overflow:hidden;position:relative}
.pr-bar-fill{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:8px;min-width:3px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.pr-bar-fill span{font-size:9px;font-family:var(--font-mono);font-weight:600;color:rgba(255,255,255,.9);white-space:nowrap}
.pr-bar-pct{font-family:var(--font-mono);font-size:10px;color:var(--muted);min-width:42px;text-align:right;flex-shrink:0}
.pr-bar-votes{font-family:var(--font-mono);font-size:9px;color:var(--muted);min-width:52px;text-align:right;flex-shrink:0}

/* province breakdown grid */
.pr-prov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:24px}
.pr-prov-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;transition:border-color .18s}
.pr-prov-card:hover{border-color:var(--blue)}
.pr-prov-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-family:var(--font-mono);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.pr-prov-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.pr-prov-row:last-child{margin-bottom:0}
.pr-prov-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pr-prov-name{font-size:11px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.pr-prov-track{width:70px;height:5px;background:rgba(122,144,176,.08);border-radius:2px;overflow:hidden;flex-shrink:0}
.pr-prov-fill{height:100%;border-radius:2px}
.pr-prov-pct{font-family:var(--font-mono);font-size:9px;color:var(--muted);min-width:36px;text-align:right;flex-shrink:0}

/* "all parties" small table */
.pr-all-table{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:24px}
.pr-all-head{display:grid;grid-template-columns:32px 1fr 80px 70px 60px;gap:0;padding:8px 14px;background:rgba(122,144,176,.04);border-bottom:1px solid var(--border);font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-family:var(--font-mono)}
.pr-all-row{display:grid;grid-template-columns:32px 1fr 80px 70px 60px;gap:0;padding:9px 14px;border-bottom:1px solid rgba(122,144,176,.04);align-items:center;transition:background .12s}
.pr-all-row:last-child{border-bottom:none}
.pr-all-row:hover{background:rgba(61,142,240,.04)}
.pr-all-row.forfeited{opacity:.5}
.pr-all-pct.red{color:#ff6b6b}
.pr-all-rk{font-size:10px;font-weight:700;font-family:var(--font-mono);color:var(--muted)}
.pr-all-name{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px}
.pr-all-votes{font-family:var(--font-mono);font-size:11px;text-align:right;color:var(--text)}
.pr-all-pct{font-family:var(--font-mono);font-size:10px;color:var(--muted);text-align:right}
.pr-all-bar-wrap{padding-right:6px}
.pr-all-bar-track{height:4px;background:rgba(122,144,176,.1);border-radius:2px;overflow:hidden}
.pr-all-bar-fill{height:100%;border-radius:2px}

/* ── ESTIMATED SEATS BOXES ── */
.eb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:24px}
.eb-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;position:relative;transition:transform .15s,box-shadow .15s}
.eb-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.25)}
.eb-top{display:flex;align-items:center;gap:8px;padding:12px 12px 8px}
.eb-color-bar{width:3px;height:32px;border-radius:2px;flex-shrink:0}
.eb-rank{font-size:10px;font-weight:700;font-family:var(--font-mono);color:var(--muted);flex-shrink:0}
.eb-name{font-size:10.5px;font-weight:700;color:var(--text);line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.eb-total{font-family:var(--font-display);font-size:38px;line-height:1;letter-spacing:-2px;font-weight:700;padding:2px 12px 0;text-align:center}
.eb-label{font-size:7px;font-weight:700;letter-spacing:2px;color:var(--muted);font-family:var(--font-mono);text-align:center;margin-bottom:8px}
.eb-chips{display:flex;flex-wrap:wrap;gap:4px;padding:0 10px 8px;justify-content:center;min-height:22px}
.eb-chip{font-size:9px;font-weight:700;font-family:var(--font-mono);padding:2px 6px;border-radius:3px;letter-spacing:.3px}
.eb-chip-won{background:rgba(34,212,114,.12);color:#22d472;border:1px solid rgba(34,212,114,.2)}
.eb-chip-lead{background:rgba(245,200,66,.12);color:var(--gold);border:1px solid rgba(245,200,66,.2)}
.eb-chip-pr{background:rgba(61,142,240,.12);color:#3d8ef0;border:1px solid rgba(61,142,240,.18)}
.eb-bar-track{height:4px;background:rgba(122,144,176,.1);margin:0;border-radius:0 0 12px 12px;overflow:hidden;position:relative}
.eb-bar-fill{height:100%;border-radius:0 0 12px 12px}
@media(max-width:700px){
  .eb-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
  .eb-total{font-size:30px}
}
.pr-note{font-size:10px;color:var(--muted);font-family:var(--font-mono);text-align:center;padding:10px 0;border-top:1px solid var(--border);letter-spacing:.3px}

@media(max-width:900px){
  .pr-main-grid{grid-template-columns:1fr}
  .pr-donut-card{flex-direction:row;align-items:flex-start;gap:16px;flex-wrap:wrap}
  .pr-donut-wrap{margin-bottom:0;flex-shrink:0}
  .pr-legend{flex:1;min-width:140px}
}
@media(max-width:700px){
  /* Banner */
  .pr-banner{padding:20px 16px}
  .pr-banner-grid{grid-template-columns:1fr}
  .pr-banner-stats{display:none}
  .pr-banner-left h2{font-size:28px;letter-spacing:1.5px}
  .pr-banner-left p{font-size:10px}
  /* Main grid: stack donut above bars */
  .pr-main-grid{grid-template-columns:1fr;gap:12px}
  /* Donut: shrink and go horizontal */
  .pr-donut-card{flex-direction:row;align-items:center;gap:14px;padding:14px}
  .pr-donut-wrap{width:120px;height:120px;flex-shrink:0;margin-bottom:0}
  .pr-donut-wrap svg{width:120px;height:120px}
  .pr-donut-total{font-size:18px}
  .pr-legend{flex:1;min-width:0}
  .pr-leg-item{font-size:9.5px}
  /* Bar rows: party name takes remaining space, hide vote count */
  .pr-bar-row{gap:6px}
  .pr-bar-name{flex:0 0 auto;width:110px;font-size:10px}
  .pr-bar-votes{display:none}
  .pr-bar-pct{min-width:34px;font-size:9px}
  .pr-bar-fill span{font-size:8px}
  /* Province grid: single column */
  .pr-prov-grid{grid-template-columns:1fr}
  .pr-prov-name{font-size:10.5px}
  /* All-parties table: hide bar column, tighten */
  .pr-all-head,.pr-all-row{grid-template-columns:24px 1fr 72px 48px}
  .pr-all-head>:last-child,.pr-all-row>:last-child{display:none}
  .pr-all-name{font-size:10px}
  .pr-all-votes{font-size:10px}
  /* Tabs */
  .view-tab{font-size:10.5px;padding:9px 0}
}

/* ── mobile sidebar button ── */
.mob-sb-btn{display:none;position:fixed;bottom:80px;left:16px;z-index:400;width:52px;height:52px;border-radius:50%;background:var(--blue);color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 18px rgba(61,142,240,.5);-webkit-tap-highlight-color:transparent;touch-action:manipulation;align-items:center;justify-content:center;flex-direction:column;line-height:1;}
.mob-sb-btn-label{font-size:7px;font-weight:700;color:#fff;letter-spacing:.3px;margin-top:2px;font-family:var(--font-mono)}
.mob-sb-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.65);z-index:350;opacity:0;transition:opacity .25s;pointer-events:none;}
.mob-sb-overlay.open{opacity:1;pointer-events:all}

@media(max-width:900px){
  .hero-grid{grid-template-columns:1fr 1fr;}
  .party-hero-1{grid-column:1/-1;min-height:140px}
  .ph-seats-num{font-size:42px}
}
@media(max-width:700px){
  header{padding:0 14px;height:52px}
  .hd-title h1{font-size:17px}
  .hd-title p{display:none}
  .tog-label{display:none}
  .live-pill{padding:4px 8px;font-size:8px}

/* ── static config (baked in at build time) ── */
const PCOLORS    = {"Nepali Congress": "#22d472", "CPN-UML": "#f97316", "CPN (Maoist Centre)": "#c0392b", "CPN (Unified Socialist)": "#f97316", "Rastriya Swatantra Party": "#3d8ef0", "Rastriya Prajatantra Party": "#8b5cf6", "Janmat Party": "#f59e0b", "Independent": "#6b7280", "राष्ट्रिय स्वतन्त्र पार्टी": "#3d8ef0", "नेपाल कम्युनिष्ट पार्टी (एकीकृत मार्क्सवादी लेनिनवादी)": "#f97316", "नेपाली काँग्रेस": "#22d472", "नेपाली कम्युनिष्ट पार्टी": "#f5c842", "श्रम संस्कृति पार्टी": "#f97316", "राष्ट्रिय प्रजातन्त्र पार्टी": "#8b5cf6", "स्वतन्त्र": "#6b7280", "प्रगतिशील लोकतान्त्रिक पार्टी": "#06b6d4", "नेकपा-एमाले": "#f97316", "नेकपा (माओवादी केन्द्र)": "#c0392b", "नेकपा (एकीकृत समाजवादी)": "#f97316", "जनमत पार्टी": "#f59e0b", "नेपाल कम्युनिस्ट पार्टी (माओवादी)": "#c0392b", "जनता समाजवादी पार्टी, नेपाल": "#f59e0b", "नागरिक उन्मुक्ति पार्टी, नेपाल(एकल चुनाव चिन्ह)": "#06b6d4"};
const PROVCOLORS = {"Koshi": "#ef4444", "कोशी": "#ef4444", "प्रदेश नं. १": "#ef4444", "Madhesh": "#f97316", "मधेश": "#f97316", "Bagmati": "#3b82f6", "बागमती": "#3b82f6", "Gandaki": "#8b5cf6", "गण्डकी": "#8b5cf6", "Lumbini": "#10b981", "लुम्बिनी": "#10b981", "Karnali": "#f59e0b", "कर्णाली": "#f59e0b", "Sudurpashchim": "#06b6d4", "सुदूरपश्चिम": "#06b6d4"};
const CSV_URL    = 'nepal_election_results.csv';
const PR_CSV_URL = 'nepal_pr_votes.csv';
const REFRESH_MS = 10 * 60 * 1000; // 10 minutes

let prData = [];       // parsed PR rows
let activeTab = 'fptp'; // 'fptp' | 'pr'

const pc  = p => PCOLORS[p]    || '#94a3b8';
const pvc = p => PROVCOLORS[p] || '#5a7494';

/* ── CSV parser ── */
function parseCSV(text) {
  const lines = text.split(String.fromCharCode(10)).map(l=>l.charCodeAt(l.length-1)===13?l.slice(0,-1):l).filter(l=>l.trim());
  if (!lines.length) return [];
  // Parse respecting quoted fields
  function parseLine(line) {
    const fields = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { fields.push(cur); cur = ''; }
      else { cur += ch; }
    }
    fields.push(cur);
    return fields;
  }
  const headers = parseLine(lines[0]).map(h => (h.charCodeAt(0)===0xFEFF?h.slice(1):h).trim());
  return lines.slice(1).map(line => {
    const vals = parseLine(line);
    const row = {};
    headers.forEach((h, i) => { row[h] = (vals[i] || '').trim(); });
    return row;
  }).filter(r => Object.values(r).some(v => v));
}

/* ── normalise a raw CSV row to standard keys ── */
const DIRECT_KEYS = new Set([
  'Candidate Name','Political Party','Votes Received',
  'Province','District','Constituency','Age','Gender','Status','Symbol','Rank'
]);

function normaliseRow(r) {
  const out = {};
  for (const [col, val] of Object.entries(r)) {
    // If the column is already the correct English name, use it directly
    if (DIRECT_KEYS.has(col)) {
      out[col] = val;
      continue;
    }
    const lc = col.toLowerCase();
    if      (lc.includes('candidate') || lc.includes('नाम'))    out['Candidate Name']  = val;
    else if (lc.includes('party')     || lc.includes('दल'))     out['Political Party'] = val;
    else if (lc.includes('vote')      || lc.includes('मत'))     out['Votes Received']  = val;
    else if (lc.includes('province')  || lc.includes('प्रदेश') || lc.includes('state')) out['Province'] = val;
    else if (lc.includes('district')  || lc.includes('जिल्ला')) out['District']        = val;
    else if (lc.includes('const')     || lc.includes('निर्वाचन')) out['Constituency']  = val;
    else if (lc.includes('age')       || lc.includes('उमेर'))   out['Age']             = val;
    else if (lc.includes('gender')    || lc.includes('लिङ्ग'))  out['Gender']          = val;
    else if (lc.includes('status')    || lc.includes('कैफियत')) out['Status']          = val;
    else out[col] = val;
  }
  // ensure defaults
  ['Candidate Name','Political Party','Votes Received','Province','District','Constituency','Age','Gender','Status']
    .forEach(k => { if (out[k] === undefined) out[k] = ''; });
  const raw = String(out['Votes Received'] || '').replace(/,/g,'').trim();
  out._v = parseInt(raw) || 0;
  return out;
}

/* ── global state ── */
let data = [];
let provinces = [], distsByProv = {}, constsByDist = {};
let selProv = null, selDist = null, openProvs = new Set();
let lastView = 'home'; // 'home' | 'province' | 'district'

function rebuildIndexes() {
  provinces = [...new Set(data.map(r => r.Province))].filter(Boolean);
  distsByProv = {};
  provinces.forEach(p => {
    distsByProv[p] = [...new Set(data.filter(r => r.Province === p).map(r => r.District))];
  });
  constsByDist = {};
  data.forEach(r => {
    if (!constsByDist[r.District]) constsByDist[r.District] = [];
    const key = r.District + '::' + r.Constituency;
    if (!constsByDist[r.District].find(x => x.key === key))
      constsByDist[r.District].push({ key, name: r.Constituency, district: r.District });
  });
}

/* ── load / refresh CSV ── */
async function loadData(isRefresh) {
  const mainEl = document.getElementById('main');

  // ── file:// protocol: can't fetch() — show a file picker instead ──────────
  if (location.protocol === 'file:') {
    if (isRefresh) return; // auto-refresh not possible without a server; skip silently
    mainEl.innerHTML = `
      <div class="empty" style="padding:60px 20px">
        <div class="ico">📂</div>
        <p style="font-size:15px;font-weight:600;margin-bottom:8px;color:var(--text)">Select your CSV file</p>
        <p style="font-size:11px;color:var(--muted);margin-bottom:22px;line-height:1.6">
          Browsers block automatic file access when opening HTML directly.<br>
          Pick <code>nepal_election_results.csv</code> to continue.
        </p>
        <label style="display:inline-flex;align-items:center;gap:9px;padding:10px 24px;
          background:var(--blue);color:#fff;border-radius:8px;cursor:pointer;
          font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(61,142,240,.35)">
          📄 Choose CSV File
          <input type="file" accept=".csv,text/csv" id="_csvPicker" style="display:none">
        </label>
        <p style="font-size:10px;color:var(--muted);margin-top:14px;font-style:italic">
          Tip: run <code>python run.py</code> for fully automatic loading &amp; live refresh.
        </p>
      </div>`;
    document.getElementById('_csvPicker').addEventListener('change', function() {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => _ingestCSV(e.target.result, false);
      reader.onerror = () => _showLoadError('Could not read file.', mainEl);
      reader.readAsText(file, 'utf-8');
    });
    return;
  }

  // ── http:// protocol: fetch CSV from server ───────────────────────────────
  if (!isRefresh) {
    mainEl.innerHTML = `<div class="empty"><div class="ico">⏳</div><p id="load-status">Fetching results…</p></div>`;
  }
  const setStatus = msg => { const el = document.getElementById('load-status'); if (el) el.textContent = msg; };

  try {
    const url = CSV_URL + '?_=' + Date.now();
    setStatus('Connecting to server…');
    const res = await fetch(url);
    if (!res.ok) throw new Error('Server returned HTTP ' + res.status);
    setStatus('Parsing CSV…');
    const text = await res.text();
    _ingestCSV(text, isRefresh);
  } catch(e) {
    _showLoadError(e.message || String(e), mainEl);
  }
}

function _ingestCSV(text, isRefresh) {
  const mainEl = document.getElementById('main');
  try {
    const raw = parseCSV(text);
    data = raw.map(normaliseRow).filter(r => r['Candidate Name']);
    if (!data.length) {
      throw new Error(
        `CSV parsed ${raw.length} rows but 0 passed the "Candidate Name" filter. ` +
        `Headers found: ${raw[0] ? Object.keys(raw[0]).join(', ') : 'none'}`
      );
    }
    rebuildIndexes();

    const np = provinces.length;
    const nd = Object.keys(distsByProv).reduce((s,p) => s + distsByProv[p].length, 0);
    const nc = Object.keys(constsByDist).reduce((s,d) => s + constsByDist[d].length, 0);
    document.getElementById('hd-sub').textContent =
      `🏛 ${np} PROVINCES · ${nd} DISTRICTS · ${nc} CONSTITUENCIES · ${data.length} CANDIDATES`;

    if (isRefresh) {
      buildSidebar();
      if (!selProv && !selDist) renderHome(); else renderMain();
      flashRefresh();
    } else {
      buildSidebar();
      renderHome();
    }
  } catch(e) {
    _showLoadError(e.message || String(e), mainEl);
  }
}

function _showLoadError(msg, mainEl) {
  console.error('[loadData] ERROR:', msg);
  mainEl.innerHTML = `
    <div class="empty">
      <div class="ico">⚠️</div>
      <p style="color:#ff6b6b;font-weight:600;margin-bottom:12px">${msg}</p>
      <p style="font-size:11px;color:var(--muted);margin-bottom:16px">
        Make sure <code>nepal_election_results.csv</code> is in the same folder,<br>
        and open the page via <strong>python run.py</strong> (not file://).
      </p>
      <button onclick="loadData(false)" style="
        padding:8px 20px;background:var(--blue);color:#fff;border:none;
        border-radius:6px;cursor:pointer;font-size:13px;font-weight:600">
        🔄 Retry
      </button>
    </div>`;
}

function flashRefresh() {
  const pill = document.querySelector('.live-pill');
  if (!pill) return;
  pill.style.background = 'rgba(34,212,114,.25)';
  pill.style.borderColor = 'rgba(34,212,114,.6)';
  setTimeout(() => { pill.style.background = ''; pill.style.borderColor = ''; }, 800);
}

/* ── smart refresh: SSE from run.py pushes reload the moment scrape finishes ── */
loadData(false);

(function startSync() {
  let sseOk = false;
  if (typeof EventSource !== 'undefined' && location.protocol !== 'file:') {
    const es = new EventSource('/sse');
    es.addEventListener('reload', () => {
      console.log('[SSE] reload event — refreshing CSV');
      loadData(true);
    });
    es.onopen  = () => { sseOk = true; };
    es.onerror = () => {
      if (sseOk) return;            // transient error on a live connection — SSE is working
      es.close();                   // /sse endpoint not available (no run.py), fall back
      setInterval(() => loadData(true), REFRESH_MS);
    };
  } else {
    setInterval(() => loadData(true), REFRESH_MS);  // file:// fallback
  }
})();

function partyTotals(rows){
  const t={};
  rows.forEach(r=>{t[r['Political Party']]=(t[r['Political Party']]||0)+r._v});
  return Object.entries(t).sort((a,b)=>b[1]-a[1]);
}
function seatsWon(rows){
  const s={},bc={};
  rows.forEach(r=>{
    const key=r.District+'::'+r.Constituency;
    if(!bc[key])bc[key]=[];bc[key].push(r);
  });
  Object.values(bc).forEach(cs=>{
    const w=cs.reduce((a,b)=>a._v>b._v?a:b);
    s[w['Political Party']]=(s[w['Political Party']]||0)+1;
  });
  return s;
}

/* ── won vs still-leading split ── */
/* Status="Elected" = confirmed win; rank-1 without Elected = still leading */
function wonLeadingCount(allData) {
  const won={}, leading={};
  const bc={};
  allData.forEach(r=>{
    const key=r.District+'::'+r.Constituency;
    if(!bc[key])bc[key]=[];
    bc[key].push(r);
  });
  Object.values(bc).forEach(cs=>{
    const top=cs.reduce((a,b)=>a._v>b._v?a:b);
    const p=top['Political Party'];
    if((top['Status']||'').trim().toLowerCase()==='elected'){
      won[p]=(won[p]||0)+1;
    } else {
      leading[p]=(leading[p]||0)+1;
    }
  });
  return {won, leading};
}
function fmtV(n){return n>=1000?(n/1000).toFixed(1)+'K':n}

function abbrParty(name){
  if(!name) return '';
  const words=name.trim().split(' ').filter(x=>x);
  if(words.length===1) return name;
  const seg=(typeof Intl!=='undefined'&&Intl.Segmenter)
    ?new Intl.Segmenter('ne',{granularity:'grapheme'})
    :null;
  return words.map(w=>{
    if(!w) return '';
    if(seg) return [...seg.segment(w)][0].segment;
    return [...w][0]||w[0];
  }).join('');
}

/* ── animated counter helper ── */
function animateCount(el, target, duration){
  const start = performance.now();
  function step(now){
    const p = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3); // ease-out cubic
    el.textContent = Math.round(ease * target);
    if(p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

/* ── home overview ── */

  const main = document.getElementById('main');

  // Group by constituency
  const byConst = {};

        <div class="ph-total-line">Total: <strong>${x.won}</strong> seats won</div>

    </div>`;
  }).join('');

  // Full party table
  const tableHTML = sorted.map((x,i)=>{

  main.innerHTML = `

        <div class="home-banner-grid">

/* ── Load PR CSV ── */
async function loadPRData() {
  if (location.protocol === 'file:') {
    // file:// — user may pick PR CSV separately; try anyway, silently ignore failure
    return;
  }
  try {
    const res = await fetch(PR_CSV_URL + '?_=' + Date.now());
    if (!res.ok) return;
    const text = await res.text();
    const raw = parseCSV(text);
    prData = raw.map(r => {
      const votes = parseInt(String(r['Votes Received']||'').replace(/,/g,'')) || 0;
      return {
        level:   (r['Level']          || '').trim(),
        province:(r['Province']        || '').trim(),
        party:   (r['Political Party'] || '').trim(),
        symbolId:(r['Symbol ID']       || '').trim(),
        votes,
        pct:     parseFloat(r['Vote Share %']) || 0,
        rank:    parseInt(r['Rank']) || 0,
      };
    }).filter(r => r.party && r.votes > 0);
  } catch(e) {
    console.warn('[PR] Could not load PR CSV:', e.message);
  }
}

/* ── PR party color — reuse PCOLORS or generate from a palette ── */
const PR_PALETTE = [
  '#3d8ef0','#22d472','#f97316','#8b5cf6','#f5c842',
  '#f97316','#06b6d4','#ec4899','#10b981','#a78bfa',
  '#fb923c','#38bdf8','#e879f9','#4ade80','#fbbf24',
];
const _prColorCache = {};
function prColor(party) {
  if (PCOLORS[party]) return PCOLORS[party];
  if (_prColorCache[party]) return _prColorCache[party];
  const idx = Object.keys(_prColorCache).length % PR_PALETTE.length;
  _prColorCache[party] = PR_PALETTE[idx];
  return _prColorCache[party];
}

function fmtBig(n) {
  if (n >= 1_000_000) return (n/1_000_000).toFixed(2)+'M';
  if (n >= 1000)      return (n/1000).toFixed(1)+'K';
  return n.toLocaleString();
}

/* ── Build SVG donut ── */
function buildDonut(parties, size=180, stroke=28) {
  const r = (size - stroke) / 2;
  const cx = size / 2, cy = size / 2;
  const circ = 2 * Math.PI * r;
  const total = parties.reduce((s,p) => s + p.votes, 0);
  let offset = 0;
  const segs = parties.map((p, i) => {
    const frac = p.votes / total;
    const dash = frac * circ;
    const gap  = circ - dash;
    const seg  = `<circle cx="${cx}" cy="${cy}" r="${r}"
      fill="none" stroke="${prColor(p.party)}" stroke-width="${stroke}"
      stroke-dasharray="${dash.toFixed(2)} ${gap.toFixed(2)}"
      stroke-dashoffset="${(-offset * circ).toFixed(2)}"
      style="transition:stroke-dasharray 1.2s cubic-bezier(.4,0,.2,1)">
      <title>${p.party}: ${p.votes.toLocaleString()} (${(frac*100).toFixed(1)}%)</title>
    </circle>`;
    offset += frac;
    return seg;
  });
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" style="transform:rotate(-90deg)">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(122,144,176,.08)" stroke-width="${stroke}"/>
    ${segs.join('')}
  </svg>`;
}

  const tabBar = document.createElement('div');
  tabBar.className = 'view-tabs';
  tabBar.id = 'viewTabs';
  tabBar.innerHTML = `
    <button class="view-tab ${activeTab==='fptp'?'active':''}" data-tab="fptp">🏛 FPTP Results</button>
    <button class="view-tab ${activeTab==='pr'?'active':''}" data-tab="pr">📊 Proportional (PR)</button>
  `;
  container.insertBefore(tabBar, container.firstChild);
  tabBar.querySelectorAll('.view-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTab = btn.dataset.tab;
      routeHome();
    });
  });
}

function routeHome() {
  selProv = null; selDist = null;
  buildSidebar();
  if (activeTab === 'pr') {
    renderPR();
  } else {
    renderFPTPHome();
  }
}

// Rename original renderHome → renderFPTPHome
const renderFPTPHome = renderHome;

// Override renderHome so all internal calls (refresh, homeBtn) go through router
renderHome = function() {
  routeHome();
};

/* ── Also load PR data on startup ── */
loadPRData();

/* ── end of static JS ── */

</script>
</body>
</html>
