<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nepal Election 2082 – Live Results</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

/* ── theme tokens ── */
:root{
  --bg:#0a0c10;--surf:#0f1219;--card:#141720;--border:#1e2535;
  --text:#f0f2f7;--muted:#4a5a72;--sub:#7a90b0;
  --gold:#f5c842;--accent:#ff4d6d;--blue:#3d8ef0;--green:#22d472;--red:#ff4d6d;
  --shadow:rgba(0,0,0,.7);
  --header-bg:#0a0c10;
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
}
html.light{
  --bg:#f4f5f8;--surf:#fff;--card:#fff;--border:#e0e5ef;
  --text:#0f1728;--muted:#8090aa;--sub:#4a6080;
  --gold:#c9940a;--blue:#1e6de0;--green:#12a850;--red:#e02040;
  --shadow:rgba(0,0,0,.1);
  --header-bg:#0f1728;
}

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;transition:background .3s,color .3s;}

/* ── header ── */
header{
  background:var(--header-bg);
  border-bottom:1px solid var(--border);
  padding:0 24px;height:58px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;gap:12px;
}
.hd-left{display:flex;align-items:center;gap:14px;min-width:0}
.flag-stripe{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.flag-stripe span{display:block;width:3px;height:10px;border-radius:2px}
.flag-stripe span:nth-child(1){background:#003893;height:14px}
.flag-stripe span:nth-child(2){background:#dc143c;height:14px}
.hd-title h1{font-family:var(--font-display);font-size:22px;letter-spacing:1.5px;color:#fff;line-height:1;white-space:nowrap}
.hd-title h1 em{color:var(--gold);font-style:normal}
.hd-title p{font-size:10px;color:rgba(255,255,255,.38);margin-top:3px;font-family:var(--font-mono);letter-spacing:.4px;white-space:nowrap}
.hd-right{display:flex;align-items:center;gap:9px;flex-shrink:0}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(34,212,114,.08);border:1px solid rgba(34,212,114,.25);border-radius:4px;padding:5px 12px;font-size:9px;font-weight:700;color:#22d472;letter-spacing:1.5px;font-family:var(--font-mono)}
.dot{width:5px;height:5px;border-radius:50%;background:#22d472;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.2;transform:scale(1.8)}}
.tog-row{display:flex;align-items:center;gap:6px}
.tog-label{font-size:10px;color:rgba(255,255,255,.4);white-space:nowrap}
.tog{width:42px;height:24px;border-radius:12px;border:none;cursor:pointer;background:rgba(255,255,255,.1);position:relative;transition:background .25s;flex-shrink:0;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .25s}
html.light .tog{background:rgba(255,255,255,.2)}
html.light .tog::after{transform:translateX(17px);background:var(--gold)}

/* ── layout ── */
.layout{display:flex;min-height:calc(100vh - 58px)}

/* ── sidebar ── */
aside{
  width:250px;min-width:250px;background:var(--surf);border-right:1px solid var(--border);
  padding:6px 0;overflow-y:auto;max-height:calc(100vh - 58px);
  position:sticky;top:58px;transition:background .3s,border-color .3s;
}
.sb-title{font-size:8px;letter-spacing:2.5px;font-weight:700;color:var(--muted);text-transform:uppercase;padding:10px 16px 6px;font-family:var(--font-mono)}
.prov-btn{width:100%;padding:11px 16px;background:none;border:none;font-family:var(--font-body);font-size:12.5px;font-weight:600;color:var(--sub);text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .15s;touch-action:manipulation;}
.prov-btn:hover{color:var(--text);background:rgba(61,142,240,.06)}
.prov-btn.active{color:var(--gold)}
.prov-btn.open .arr{transform:rotate(90deg)}
.arr{transition:transform .2s;font-size:7px;opacity:.4}
.dot8{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:8px;flex-shrink:0}
.dist-list{overflow:hidden}
.dist-btn{width:100%;padding:10px 16px 10px 32px;background:none;border:none;border-left:2px solid transparent;font-family:var(--font-body);font-size:11.5px;color:var(--muted);text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .15s;}
.dist-btn:hover{color:var(--text);background:rgba(61,142,240,.05)}
.dist-btn.active{color:var(--text);background:rgba(61,142,240,.07);border-left-color:var(--blue);font-weight:600}
.cc{font-size:9px;background:rgba(122,144,176,.1);border-radius:4px;padding:1px 6px;color:var(--muted);margin-left:4px;font-family:var(--font-mono)}

/* ── main panel ── */
main{flex:1;padding:24px 28px;overflow-y:auto;min-width:0}

/* ── stats row ── */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:22px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;transition:border-color .2s,background .3s}
.scard:hover{border-color:var(--blue)}
.slbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:5px;font-family:var(--font-mono)}
.sval{font-size:22px;font-weight:700;font-family:var(--font-mono)}
.ssub{font-size:9px;color:var(--muted);margin-top:2px}

/* ── section header ── */
.sh{display:flex;align-items:center;gap:8px;margin-bottom:13px;margin-top:2px}
.sh h2{font-family:var(--font-display);font-size:18px;letter-spacing:1px}
.tag{background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.2);color:var(--gold);border-radius:4px;padding:2px 9px;font-size:9px;font-weight:700;font-family:var(--font-mono);letter-spacing:.5px}
html.light .tag{background:rgba(201,148,10,.08);border-color:rgba(201,148,10,.2);color:var(--gold)}

/* ── party summary (district/province view) ── */
.psumm{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 17px;margin-bottom:20px;transition:background .3s,border-color .3s}
.prow{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid rgba(122,144,176,.05)}
.prow:last-child{border-bottom:none}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pname{font-size:11.5px;font-weight:500;min-width:185px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pbw{flex:1;background:rgba(122,144,176,.08);border-radius:2px;height:5px;overflow:hidden}
.pb{height:100%;border-radius:2px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.pvot{font-family:var(--font-mono);font-size:10px;color:var(--muted);min-width:60px;text-align:right}
.pseat{font-family:var(--font-mono);font-size:10px;min-width:40px;text-align:right;font-weight:700}
.pseat.w{color:var(--green)}

/* ── constituency tabs ── */
.ctabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.ctab{padding:5px 12px;background:var(--card);border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:11px;font-weight:500;color:var(--muted);transition:all .15s;font-family:var(--font-body)}
.ctab:hover{color:var(--text);border-color:var(--blue)}
.ctab.active{background:rgba(61,142,240,.1);border-color:var(--blue);color:var(--text);font-weight:600}

/* ── chart box ── */
.cbox{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:16px;transition:background .3s,border-color .3s}
.ctitle{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;font-family:var(--font-mono)}
.hrow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.hlbl{font-size:11px;min-width:150px;text-align:right;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hpty{font-size:9px;font-weight:700;opacity:.6;margin-left:4px;letter-spacing:.3px}
.htrack{flex:1;background:rgba(122,144,176,.07);border-radius:2px;height:18px;overflow:hidden}
.hfill{height:100%;border-radius:2px;display:flex;align-items:center;padding-left:6px;min-width:3px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.hfill span{font-size:9.5px;font-family:var(--font-mono);font-weight:500;color:rgba(255,255,255,.9);white-space:nowrap}
.hpct{font-family:var(--font-mono);font-size:10px;color:var(--muted);min-width:42px;text-align:right}

/* ── candidate cards ── */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:10px;margin-bottom:20px}
.ccard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden;transition:border-color .2s,transform .15s,background .3s}
.ccard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.ccard:hover{border-color:var(--blue);transform:translateY(-1px)}
.ccard.win{border-color:rgba(34,212,114,.3)}
.ccard.win::before{background:var(--green)}
.rnk{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0;font-family:var(--font-mono)}
.r1{background:rgba(245,200,66,.12);color:var(--gold);border:1px solid rgba(245,200,66,.25)}
.r2{background:rgba(148,163,184,.07);color:#8ba3c0;border:1px solid rgba(148,163,184,.14)}
.r3{background:rgba(180,130,90,.07);color:#b4845a;border:1px solid rgba(180,130,90,.14)}
.rn{background:rgba(148,163,184,.03);color:var(--muted);border:1px solid var(--border)}
.ci{flex:1;min-width:0}
.cname{font-weight:600;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cpty{font-size:10px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:4px}
.ptdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.cmeta{font-size:9.5px;color:var(--muted);margin-top:2px}
.cvr{text-align:right}
.vnum{font-family:var(--font-mono);font-size:13px;font-weight:700}
.vbar{margin-top:4px;background:rgba(122,144,176,.08);border-radius:2px;height:2px;width:65px}
.vbar-f{height:100%;border-radius:2px;transition:width .8s}
.crown{position:absolute;right:10px;top:8px;font-size:12px;opacity:.6}

/* ── breadcrumb ── */
.bc{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);margin-bottom:18px;flex-wrap:wrap;font-family:var(--font-mono)}
.bc strong{color:var(--gold);font-weight:600}
.bsep{opacity:.3}

/* ── empty ── */
.empty{text-align:center;padding:80px 20px;color:var(--muted)}
.empty .ico{font-size:52px;margin-bottom:14px}
.empty p{font-size:13.5px}

/* ══════════════════════════════════════════
   HOME PAGE — BOLD PARTY CARDS REDESIGN
══════════════════════════════════════════ */
.home-wrap{max-width:1100px;margin:0 auto;padding-bottom:40px}

/* top banner */
.home-banner{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,#0d1020 0%,#141830 50%,#0a0d18 100%);
  border:1px solid var(--border);border-radius:14px;
  padding:32px 36px;margin-bottom:28px;
}
.home-banner::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 80% at 80% 50%,rgba(245,200,66,.06) 0%,transparent 70%);
  pointer-events:none;
}
.home-banner-grid{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center}
.home-banner-left h2{
  font-family:var(--font-display);font-size:48px;letter-spacing:3px;
  color:#fff;line-height:.95;margin-bottom:8px;
}
.home-banner-left h2 em{color:var(--gold);font-style:normal}
.home-banner-left p{font-size:12px;color:rgba(255,255,255,.4);font-family:var(--font-mono);letter-spacing:.5px}
.home-banner-stats{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.hbs-item{text-align:right}
.hbs-num{font-family:var(--font-display);font-size:36px;color:var(--gold);letter-spacing:2px;line-height:1}
.hbs-lbl{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:1.5px;text-transform:uppercase;font-family:var(--font-mono)}
.nepal-flag-decor{position:absolute;right:200px;top:50%;transform:translateY(-50%);opacity:.04;font-size:120px;pointer-events:none;user-select:none}

/* section label */
.section-label{
  display:flex;align-items:center;gap:12px;margin-bottom:16px;
}
.section-label span{font-family:var(--font-display);font-size:22px;letter-spacing:1.5px;color:var(--text)}
.section-label-line{flex:1;height:1px;background:var(--border)}
.section-sublabel{font-size:9px;color:var(--muted);font-family:var(--font-mono);letter-spacing:1px}

/* ── HERO PARTY CARDS (top 3) ── */
.hero-grid{
  display:grid;
  grid-template-columns:2fr 1fr 1fr;
  gap:12px;
  margin-bottom:12px;
}
.party-hero{
  position:relative;overflow:hidden;
  border-radius:12px;
  border:1px solid transparent;
  padding:24px;
  cursor:default;
  transition:transform .2s,box-shadow .2s;
  min-height:170px;
  display:flex;flex-direction:column;justify-content:space-between;
}
.party-hero:hover{transform:translateY(-2px)}
.party-hero-1{
  background:linear-gradient(140deg,#0f1a10 0%,#0a1a12 100%);
  border-color:rgba(34,212,114,.2);
  box-shadow:0 0 40px rgba(34,212,114,.05);
}
.party-hero-2{
  background:linear-gradient(140deg,#12141e 0%,#0e1020 100%);
  border-color:rgba(61,142,240,.2);
}
.party-hero-3{
  background:linear-gradient(140deg,#1a1210 0%,#140e0a 100%);
  border-color:rgba(245,200,66,.15);
}
.ph-glow{
  position:absolute;inset:0;pointer-events:none;border-radius:12px;
  opacity:.12;
}
.party-hero-1 .ph-glow{background:radial-gradient(ellipse 80% 80% at 0% 100%,#22d472 0%,transparent 70%)}
.party-hero-2 .ph-glow{background:radial-gradient(ellipse 80% 80% at 0% 100%,#3d8ef0 0%,transparent 70%)}
.party-hero-3 .ph-glow{background:radial-gradient(ellipse 80% 80% at 0% 100%,#f5c842 0%,transparent 70%)}
.ph-rank{
  position:absolute;right:18px;top:14px;
  font-family:var(--font-display);font-size:64px;line-height:1;
  opacity:.06;letter-spacing:-2px;
}
.ph-top{position:relative;z-index:1}
.ph-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  font-family:var(--font-mono);padding:3px 9px;border-radius:3px;margin-bottom:10px;
}
.party-hero-1 .ph-badge{background:rgba(34,212,114,.12);color:#22d472;border:1px solid rgba(34,212,114,.2)}
.party-hero-2 .ph-badge{background:rgba(61,142,240,.12);color:#3d8ef0;border:1px solid rgba(61,142,240,.2)}
.party-hero-3 .ph-badge{background:rgba(245,200,66,.1);color:var(--gold);border:1px solid rgba(245,200,66,.15)}
.ph-name{font-size:13px;font-weight:700;line-height:1.35;color:#fff;margin-bottom:0;max-width:85%}
.ph-bottom{position:relative;z-index:1}
.ph-seats-row{display:flex;align-items:baseline;gap:6px;margin-bottom:8px}
.ph-seats-num{font-family:var(--font-display);font-size:52px;line-height:1;letter-spacing:-1px}
.party-hero-1 .ph-seats-num{color:#22d472}
.party-hero-2 .ph-seats-num{color:#3d8ef0}
.party-hero-3 .ph-seats-num{color:var(--gold)}
.ph-seats-lbl{font-size:10px;color:rgba(255,255,255,.4);font-family:var(--font-mono);letter-spacing:.5px}
.ph-bar-track{width:100%;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.ph-bar-fill{height:100%;border-radius:2px;transition:width 1.4s cubic-bezier(.4,0,.2,1)}
.party-hero-1 .ph-bar-fill{background:linear-gradient(90deg,#22d472,#1aaa58)}
.party-hero-2 .ph-bar-fill{background:linear-gradient(90deg,#3d8ef0,#1e60c8)}
.party-hero-3 .ph-bar-fill{background:linear-gradient(90deg,#f5c842,#c89820)}
.ph-pct{font-family:var(--font-mono);font-size:9px;color:rgba(255,255,255,.3);margin-top:4px}

/* ── RANKED LIST (positions 4+) ── */
.party-list{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:28px}
.pl-row{
  display:flex;align-items:center;gap:12px;
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:13px 16px;
  position:relative;overflow:hidden;
  transition:border-color .18s,transform .15s;
  cursor:default;
}
.pl-row:hover{border-color:var(--blue);transform:translateX(2px)}
.pl-fill{
  position:absolute;left:0;top:0;bottom:0;
  border-radius:10px 0 0 10px;opacity:.05;
  transition:width 1.2s cubic-bezier(.4,0,.2,1);
}
.pl-rank{
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;font-family:var(--font-mono);
  flex-shrink:0;background:rgba(122,144,176,.06);
  color:var(--muted);border:1px solid var(--border);
  position:relative;z-index:1;
}
.pl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;position:relative;z-index:1}
.pl-name{flex:1;font-size:12px;font-weight:600;color:var(--text);min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:relative;z-index:1}
.pl-right{display:flex;align-items:center;gap:8px;flex-shrink:0;position:relative;z-index:1}
.pl-seats{font-family:var(--font-display);font-size:22px;letter-spacing:.5px;line-height:1}
.pl-pct{font-size:9px;color:var(--muted);font-family:var(--font-mono)}

/* ── TOTAL BAR across bottom ── */
.total-bar-section{margin-bottom:28px}
.total-bar-track{
  height:28px;background:rgba(122,144,176,.06);
  border-radius:8px;overflow:hidden;display:flex;
  border:1px solid var(--border);
}
.total-bar-seg{
  height:100%;transition:width 1.5s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.total-bar-seg:first-child{border-radius:7px 0 0 7px}
.total-bar-seg:last-child{border-radius:0 7px 7px 0}
.total-bar-legend{display:flex;flex-wrap:wrap;gap:10px 18px;margin-top:10px}
.tbl-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--sub)}
.tbl-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* home hint */
.home-hint{text-align:center;padding:12px 0;font-size:11px;color:var(--muted);font-family:var(--font-mono);letter-spacing:.3px;border-top:1px solid var(--border);margin-top:4px}

/* ── seat board (legacy, used in province/district view) ── */
.seat-board{margin:0 0 24px}
.seat-board-title{font-size:8px;letter-spacing:2px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-family:var(--font-mono)}
.seat-board-title span{flex:1;height:1px;background:var(--border)}
.party-row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:0;padding:10px 16px;margin-bottom:6px;background:var(--card);border:1px solid var(--border);border-radius:10px;position:relative;overflow:hidden;transition:border-color .2s,transform .15s;cursor:default;}
.party-row:hover{border-color:var(--blue);transform:translateX(3px)}
.party-row-fill{position:absolute;left:0;top:0;bottom:0;border-radius:10px 0 0 10px;opacity:.06;transition:width 1.2s cubic-bezier(.4,0,.2,1);}
.party-row-left{display:flex;align-items:center;gap:10px;position:relative;z-index:1;min-width:0}
.party-rank{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:var(--font-mono);flex-shrink:0;}
.party-rank.r1{background:rgba(245,200,66,.12);color:var(--gold);border:1px solid rgba(245,200,66,.25)}
.party-rank.r2{background:rgba(148,163,184,.07);color:#8ba3c0;border:1px solid rgba(148,163,184,.18)}

  const key=r.District+'::'+r.Constituency;
  if(!constsByDist[r.District].find(x=>x.key===key))
    constsByDist[r.District].push({key, name:r.Constituency, district:r.District});
});

function partyTotals(rows){
  const t={};
  rows.forEach(r=>{t[r['Political Party']]=(t[r['Political Party']]||0)+r._v});
  return Object.entries(t).sort((a,b)=>b[1]-a[1]);
}
function seatsWon(rows){
  const s={},bc={};
  rows.forEach(r=>{
    const key=r.District+'::'+r.Constituency;
    if(!bc[key])bc[key]=[];bc[key].push(r);
  });
  Object.values(bc).forEach(cs=>{
    const w=cs.reduce((a,b)=>a._v>b._v?a:b);
    s[w['Political Party']]=(s[w['Political Party']]||0)+1;
  });
  return s;
}
function fmtV(n){return n>=1000?(n/1000).toFixed(1)+'K':n}

function abbrParty(name){
  if(!name) return '';
  const words=name.trim().split(' ').filter(x=>x);
  if(words.length===1) return name;
  return words.map(w=>{
    if(!w) return '';
    const sv=w.match(/^[ऄ-औॠॡ]/u);
    if(sv) return sv[0];
    const m=w.match(/^[क-हक़-य़](?:्[क-हक़-य़])*[ा-ौॎॏ]?/u);
    return m ? m[0] : w[0];
  }).join('');
}

/* ── animated counter helper ── */
function animateCount(el, target, duration){
  const start = performance.now();
  function step(now){
    const p = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3); // ease-out cubic
    el.textContent = Math.round(ease * target);
    if(p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

    if(!cs.length) return;
    const winner = cs.reduce((a,b) => a._v > b._v ? a : b);
    const p = winner['Political Party'];
    leadCount[p] = (leadCount[p]||0) + 1;
  });

  // Only parties with at least 1 lead, sorted desc
  const sorted = Object.entries(leadCount)
    .filter(([p,n]) => n > 0)
    .sort((a,b) => b[1] - a[1]);

  const maxLeads = sorted[0]?.[1] || 1;

  // HERO CARDS — top 3
  const heroColors = ['#22d472','#3d8ef0','#f5c842'];
  const heroClass  = ['party-hero party-hero-1','party-hero party-hero-2','party-hero party-hero-3'];
  const heroBadge  = ['🏆 LEADING','2ND PLACE','3RD PLACE'];

  const heroHTML = sorted.slice(0,3).map(([p,n],i)=>{
    const pct = ((n/totalConsts)*100).toFixed(1);
    const barW = ((n/maxLeads)*100).toFixed(1);
    const col = pc(p) !== '#94a3b8' ? pc(p) : heroColors[i];
    return `
    <div class="${heroClass[i]}">
      <div class="ph-glow"></div>
      <div class="ph-rank">${i+1}</div>
      <div class="ph-top">
        <div class="ph-badge">${heroBadge[i]}</div>
        <div class="ph-name">${p}</div>
      </div>
      <div class="ph-bottom">
        <div class="ph-seats-row">
          <span class="ph-seats-num" data-hero-target="${n}">0</span>
          <span class="ph-seats-lbl">CONSTITUENCIES<br>LEADING</span>
        </div>
        <div class="ph-bar-track">
          <div class="ph-bar-fill" data-bar-target="${barW}" style="width:0%"></div>
        </div>
        <div class="ph-pct">${pct}% of ${totalConsts} total</div>
      </div>
    </div>`;
  }).join('');

  // LIST ROWS — 4th place onwards
  const listHTML = sorted.slice(3).map(([p,n],i)=>{
    const rk = i+4;
    const pct = ((n/totalConsts)*100).toFixed(1);
    const barW = ((n/maxLeads)*100).toFixed(1);
    const col = pc(p);
    return `
    <div class="pl-row">
      <div class="pl-fill" data-pl-target="${barW}" style="width:0%;background:${col}"></div>
      <div class="pl-rank">${rk}</div>
      <div class="pl-dot" style="background:${col}"></div>
      <div class="pl-name" title="${p}">${p}</div>
      <div class="pl-right">
        <span class="pl-seats" style="color:${col}" data-list-target="${n}">0</span>
        <span class="pl-pct">${pct}%</span>
      </div>
    </div>`;
  }).join('');

  // TOTAL BAR segments
  const segColors = sorted.map(([p])=>pc(p));
  const segs = sorted.map(([p,n],i)=>{
    const w = ((n/totalConsts)*100).toFixed(2);
    return `<div class="total-bar-seg" data-seg-target="${w}" style="width:0%;background:${pc(p)}" title="${p}: ${n}"></div>`;
  }).join('');
  const legend = sorted.slice(0,6).map(([p,n])=>
    `<div class="tbl-item"><div class="tbl-dot" style="background:${pc(p)}"></div>${p} (${n})</div>`
  ).join('');

  main.innerHTML = `
    <div class="home-wrap">
      <div class="home-banner">
        <div class="nepal-flag-decor">🇳🇵</div>
        <div class="home-banner-grid">
          <div class="home-banner-left">
            <h2>HOUSE OF<br><em>REPRESENTATIVES</em></h2>
            <p>FIRST PAST THE POST · 2082 BS · ELECTION RESULTS</p>
          </div>
          <div class="home-banner-stats">
            <div class="hbs-item">
              <div class="hbs-num">${totalConsts}</div>
              <div class="hbs-lbl">CONSTITUENCIES</div>
            </div>
            <div class="hbs-item">
              <div class="hbs-num">3406</div>
              <div class="hbs-lbl">CANDIDATES</div>
            </div>
            <div class="hbs-item">
              <div class="hbs-num">66</div>
              <div class="hbs-lbl">PARTIES</div>
            </div>
          </div>
        </div>
      </div>

      <div class="section-label">
        <span>TOP PARTIES</span>
        <div class="section-label-line"></div>
        <span class="section-sublabel">BY CONSTITUENCIES LED</span>
      </div>

      <div class="hero-grid">${heroHTML}</div>

      ${sorted.length > 3 ? `
      <div class="party-list">${listHTML}</div>
      ` : ''}

      <div class="section-label">
        <span>SEAT SHARE</span>
        <div class="section-label-line"></div>
        <span class="section-sublabel">PROPORTIONAL VIEW</span>
      </div>
      <div class="total-bar-section">
        <div class="total-bar-track">${segs}</div>
        <div class="total-bar-legend">${legend}</div>
      </div>

      <div class="home-hint">← SELECT A PROVINCE OR DISTRICT TO EXPLORE DETAILED RESULTS</div>
    </div>
  `;

  // Animate everything
  requestAnimationFrame(()=>{
    setTimeout(()=>{
      // Hero seat counters
      main.querySelectorAll('[data-hero-target]').forEach(el=>{
        animateCount(el, parseInt(el.dataset.heroTarget)||0, 1400);
      });
      // Hero bars
      main.querySelectorAll('.ph-bar-fill[data-bar-target]').forEach(el=>{
        el.style.transition='width 1.4s cubic-bezier(.4,0,.2,1)';
        el.style.width=el.dataset.barTarget+'%';
      });
      // List counters
      main.querySelectorAll('[data-list-target]').forEach(el=>{
        animateCount(el, parseInt(el.dataset.listTarget)||0, 900);
      });
      // List fill bars
      main.querySelectorAll('.pl-fill[data-pl-target]').forEach(el=>{
        el.style.transition='width 1.2s cubic-bezier(.4,0,.2,1)';
        el.style.width=el.dataset.plTarget+'%';
      });
      // Total bar segments
      main.querySelectorAll('.total-bar-seg[data-seg-target]').forEach((el,i)=>{
        setTimeout(()=>{
          el.style.transition='width 1.5s cubic-bezier(.4,0,.2,1)';
          el.style.width=el.dataset.segTarget+'%';
        }, i*30);
      });
    }, 60);
  });
}


/* ── sidebar builder ── */
function buildSidebar(){
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<div class="sb-title">Provinces &amp; Districts</div>';
  provinces.forEach(pr=>{
    const open = openProvs.has(pr);
    const w = document.createElement('div');
    w.innerHTML=`
      <button class="prov-btn${selProv===pr?' active':''}${open?' open':''}" data-pr="${pr}">
        <span><span class="dot8" style="background:${pvc(pr)}"></span>${pr}</span>
        <span class="arr">▶</span>
      </button>
      <div class="dist-list" style="display:${open?'block':'none'}">
        ${(distsByProv[pr]||[]).map(d=>{
          const n=(constsByDist[d]||[]).length;
          return `<button class="dist-btn${selDist===d?' active':''}" data-pr="${pr}" data-d="${d}">${d}<span class="cc">${n}</span></button>`;
        }).join('')}
      </div>`;
    sb.appendChild(w);
  });

  sb.querySelectorAll('.prov-btn').forEach(b=>{
    b.addEventListener('click', ()=>{
      const pr = b.dataset.pr;
      openProvs.has(pr) ? openProvs.delete(pr) : openProvs.add(pr);
      selProv=pr; selDist=null;
      buildSidebar(); renderMain();
    });
  });

  sb.querySelectorAll('.dist-btn').forEach(b=>{
    b.addEventListener('click', e=>{
      e.stopPropagation();
      selProv=b.dataset.pr; selDist=b.dataset.d;
      buildSidebar(); renderMain(); closeSidebar();
    });
  });
}

/* ── main render ─────────────────────────────────────────────────────────── */
function renderMain(){
  const main=document.getElementById('main');
  if(!selProv&&!selDist){ renderHome(); return; }
  const rows=selDist?data.filter(r=>r.District===selDist):data.filter(r=>r.Province===selProv);
  // Build unique constituencies as {key, name, district} using composite District::Constituency
  const constMap = {};
  rows.forEach(r=>{
    const key=r.District+'::'+r.Constituency;
    if(!constMap[key]) constMap[key]={key, name:r.Constituency, district:r.District};
  });
  const consts=Object.values(constMap).sort((a,b)=>{
    const ai=parseInt(a.name.match(/[0-9]+$/)?.[0]||0),bi=parseInt(b.name.match(/[0-9]+$/)?.[0]||0);
    if(ai!==bi) return ai-bi;
    return a.district.localeCompare(b.district)||a.name.localeCompare(b.name);
  });
  const pts=partyTotals(rows),seats=seatsWon(rows);
  const total=rows.reduce((s,r)=>s+r._v,0);
  const maxV=pts[0]?pts[0][1]:1;
  const scope=selDist||selProv;
  const bc=selDist
    ?`<strong>${selProv}</strong><span class="bsep">›</span><strong>${selDist}</strong>`
    :`<strong>${selProv}</strong>`;

  main.innerHTML=`
    <div class="bc">🗺️&nbsp;${bc}&nbsp;·&nbsp;${consts.length} constituencies&nbsp;·&nbsp;${rows.length} candidates</div>
    <div class="stats">
      <div class="scard"><div class="slbl">Total Votes</div><div class="sval">${fmtV(total)}</div><div class="ssub">cast in region</div></div>
      <div class="scard"><div class="slbl">Constituencies</div><div class="sval">${consts.length}</div><div class="ssub">in selection</div></div>
      <div class="scard"><div class="slbl">Candidates</div><div class="sval">${rows.length}</div><div class="ssub">competing</div></div>
      <div class="scard"><div class="slbl">Parties</div><div class="sval">${pts.length}</div><div class="ssub">represented</div></div>
    </div>
    <div class="sh"><h2>Party Standings</h2><span class="tag">${scope}</span></div>
    <div class="psumm">
      ${pts.map(([p,v])=>{
        const pct=((v/maxV)*100).toFixed(1),s=seats[p]||0;
        return `<div class="prow">
          <span class="pdot" style="background:${pc(p)}"></span>
          <span class="pname">${p}</span>
          <div class="pbw"><div class="pb" style="width:${pct}%;background:${pc(p)}"></div></div>
          <span class="pvot">${fmtV(v)}</span>
          <span class="pseat${s?' w':''}">${s?s+' 🏆':''}</span>
        </div>`;
      }).join('')}
    </div>
    <div class="sh"><h2>Constituencies</h2></div>
    <div class="ctabs" id="ctabs">
      ${consts.map((c,i)=>`<button class="ctab${i===0?' active':''}" data-key="${c.key}" data-dist="${c.district}">${selDist?c.name:c.district+' — '+c.name}</button>`).join('')}
    </div>
    <div id="cdetail"></div>`;

  showConst(consts[0].key, consts[0].name, rows);
  main.querySelectorAll('.ctab').forEach(b=>b.addEventListener('click',()=>{
    main.querySelectorAll('.ctab').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');showConst(b.dataset.key, b.dataset.key.split('::')[1], rows);
  }));
}

function showConst(constKey, cname, rows){
  const det=document.getElementById('cdetail');if(!det)return;
  // Filter by district+constituency composite key to get the right 165 unique constituencies
  const [distPart, constPart] = constKey.split('::');
  const cs=rows.filter(r=>r.District===distPart&&r.Constituency===constPart).sort((a,b)=>b._v-a._v);
  const mx=cs[0]?._v||1,tot=cs.reduce((s,r)=>s+r._v,0);
  det.innerHTML=`
    <div class="cbox">
      <div class="ctitle">Vote Count — ${cname}</div>
      ${cs.map(c=>{
        const pct=((c._v/mx)*100).toFixed(1),sh=tot?((c._v/tot)*100).toFixed(1):'0';
        const abbr=abbrParty(c['Political Party']);
        return `<div class="hrow">
          <div class="hlbl" title="${c['Candidate Name']}">${c['Candidate Name']}</div>
          <div class="htrack"><div class="hfill" style="width:${pct}%;background:${pc(c['Political Party'])}">
            <span>${c._v.toLocaleString()}</span></div></div>
          <div class="hpct">${sh}%</div>
        </div>`;
      }).join('')}
    </div>
    <div class="sh"><h2>Candidates</h2><span class="tag">${cname}</span></div>
    <div class="cgrid">
      ${cs.map((c,i)=>{
        const rk=i+1,rc=rk===1?'r1':rk===2?'r2':rk===3?'r3':'rn';
        const p=Math.round(mx?c._v/mx*100:0);
        return `<div class="ccard${rk===1?' win':''}">
          ${rk===1?'<span class="crown">👑</span>':''}
          <div class="rnk ${rc}">#${rk}</div>
          <div class="ci">
            <div class="cname">${c['Candidate Name']}</div>
            <div class="cpty"><span class="ptdot" style="background:${pc(c['Political Party'])}"></span>${c['Political Party']}</div>
            ${c.Age||c.Gender?`<div class="cmeta">${[c.Age?'Age: '+c.Age:'',c.Gender].filter(Boolean).join(' · ')}</div>`:''}</div>
          <div class="cvr">
            <div class="vnum" style="color:${pc(c['Political Party'])}">${c._v.toLocaleString()}</div>
            <div class="vbar"><div class="vbar-f" style="width:${p}%;background:${pc(c['Political Party'])}"></div></div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

buildSidebar();
renderHome();
</script>
</body>
</html>
