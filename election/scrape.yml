name: Scrape Election Results

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:           # also allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Write browser_request.txt from secret
        run: echo "${{ secrets.BROWSER_REQUEST }}" > browser_request.txt

      - name: Run scraper
        run: python scrape.py

      - name: Commit and push updated CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nepal_election_results.csv
          git diff --staged --quiet || git commit -m "update results $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
